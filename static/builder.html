        e.preventDefault();
        requestDelete(uiRef.current.selected);
      } else if ((e.key === "Backspace" || e.key === "Delete") && !typing && uiRef.current.selectedEdge) {
        e.preventDefault();
        requestRouteDelete(uiRef.current.selectedEdge);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [undo, redo, requestDelete, requestRouteDelete]);

  const refreshList = useCallback(() => {
    // The list API doesn't say which flows are designated templates, so read
    // each flow (they're small, local) and mark the ones that opt in with
    // "template": true. Only those appear in the Templates rail; Open flow
    // shows everything.
    return fetch("/api/flows").then((r) => r.json()).then(async (d) => {
      const items = d.flows || [];
      const marked = await Promise.all(items.map(async (f) => {
        try {
          const res = await fetch(`/api/flows/${encodeURIComponent(f.name)}`);
          const spec = await res.json();
          return { ...f, template: !!(spec && spec.template === true) };
        } catch (_) {
          return { ...f, template: false };
        }
      }));
      setFlowList(marked);
    }).catch(() => showToast("Could not list flows", true));
  }, [showToast]);
  const refreshComponents = useCallback(() => {
    return fetch("/api/components").then((r) => r.json()).then((d) => setComponents(d.components || []))
      .catch(() => {}); // the rail just shows its empty state
  }, []);

  /* ---- load flow + component lists on mount ---- */
  useEffect(() => { refreshList(); refreshComponents(); }, [refreshList, refreshComponents]);

  /* ---- load a flow ---- */
  const loadFlow = useCallback(async (name) => {
    if (!name) return;
    try {
      const res = await fetch(`/api/flows/${encodeURIComponent(name)}`);
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      flowRef.current = JSON.parse(text);   // preserves key order
      posRef.current = {};
      clearHistory();
      setSelected(null);
      setShowFlowSettings(false);
      setLoadedName(name);
      setDirty(false);
      setShowOpen(false);
      setViewKey((k) => k + 1);
      rebuild(true);
      bump();
      showToast(`Opened ${name}.json`);
      return true;
    } catch (e) {
      showToast(`Load failed: ${e.message}`, true);
      return false;
    }
  }, [rebuild, bump, showToast, clearHistory]);

  /* ---- start from a template (any saved flow) -------------------------------
     Opens the flow with the existing loader, then immediately offers Save-as so
     the user edits their own copy — the template file stays untouched unless
     they explicitly overwrite it. */
  const useTemplate = useCallback((f) => {
    if (f.name === loadedName) { showToast("This flow is already open."); return; }
    const start = async () => {
      if (await loadFlow(f.name)) setSavePrompt({ initial: `${f.name}_copy`, copy: true });
    };
    if (dirty) {
      setConfirmBox({
        title: "Start from this template?",
        message: "You have unsaved changes — opening the template will discard them.",
        confirmLabel: "Discard & continue",
        onConfirm: () => { setConfirmBox(null); start(); },
      });
    } else start();
  }, [loadedName, dirty, loadFlow, showToast]);

  /* ---- create blank ---- */
  const createNew = useCallback(() => {
    const start = () => {
      flowRef.current = blankFlow();
      posRef.current = {};
      clearHistory();
      setSelected(null);
      setShowFlowSettings(false);
      setLoadedName("");
      setDirty(false);
      setViewKey((k) => k + 1);
      rebuild(true);
      bump();
      showToast("New blank flow created");
    };
    if (dirty) {
      setConfirmBox({
        title: "Start a new flow?",
        message: "You have unsaved changes. Starting a new flow will discard them.",
        confirmLabel: "Discard & start new",
        onConfirm: () => { setConfirmBox(null); start(); },
      });
    } else start();
  }, [rebuild, bump, showToast, dirty, clearHistory]);

  /* ---- save (name is explicit; called by Save / Save-as) ---- */
  const doSave = useCallback(async (rawName) => {
    let flow = flowRef.current;
    if (!flow) return false;
    const name = (rawName || "").trim().replace(/\.json$/i, "");
    if (!name) { showToast("Enter a file name to save", true); return false; }
    if (!/^[A-Za-z0-9_-]+$/.test(name)) {
      showToast("File name: letters, numbers, - and _ only", true); return false;
    }
    if (!flow.nodes || !flow.nodes[flow.initial_node]) {
      showToast(`The first step "${flow.initial_node}" isn't defined`, true); return false;
    }
    // Copies of a template are the user's own flows: the template designation
    // only ever lands back in a file that is already a designated template
    // (e.g. an unedited open→save of the template itself, which stays
    // byte-identical). Every other save strips the flag.
    const keepFlag = flowList.length
      ? flowList.some((f) => f.name === name && f.template)
      : name === loadedName; // list unavailable: at least keep in-place saves intact
    if (flow.template === true && !keepFlag) {
      const copy = { ...flow }; // spread preserves key order
      delete copy.template;
      flow = copy;
    }
    try {
      const body = JSON.stringify(flow, null, 2);
      const res = await fetch(`/api/flows/${encodeURIComponent(name)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body,
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error || res.statusText);
      flowRef.current = flow; // the (possibly de-templated) copy is now the working flow
      setLoadedName(name);
      setDirty(false);
      setSavePrompt(null);
      showToast(`Saved to flows/${d.file}`);
      refreshList();
      bump();
      return true;
    } catch (e) {
      showToast(`Save failed: ${e.message}`, true);
      return false;
    }
  }, [showToast, refreshList, loadedName, flowList, bump]);

  // Primary Save: overwrite the loaded file if there is one, else prompt for a name.
  const onSave = useCallback(() => {
    if (loadedName) doSave(loadedName);
    else setSavePrompt({ initial: "", copy: false });
  }, [loadedName, doSave]);

  /* ---- export (download) without saving ---- */
  const exportJson = useCallback(() => {
    const flow = flowRef.current;
    if (!flow) return;
    const blob = new Blob([JSON.stringify(flow, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${loadedName || "flow"}.json`; a.click();
    URL.revokeObjectURL(url);
  }, [loadedName]);

  /* ---- save a reusable component to the library ---- */
  const saveComponent = useCallback(async ({ name, questions }) => {
    const title = String(name || "").trim();
    const qs = String(questions || "").split("\n").map((s) => s.trim()).filter(Boolean);
    if (!title) { showToast("Give the component a name", true); return false; }
    if (!qs.length) { showToast("Add at least one thing to say or ask", true); return false; }
    // Derive a storage key per question (same suggestion logic the panel uses),
    // deduped so two similar questions never collide.
    const seen = new Set();
    const fields = qs.map((q, i) => {
      const base = suggestFieldKey(q) || `answer_${i + 1}`;
      let key = base, n = 2;
      while (seen.has(key)) key = `${base}_${n++}`;
      seen.add(key);
      return { question: q, field: key, required: false };
    });
    const slug = slugify(title) || "component";
    try {
      const res = await fetch(`/api/components/${encodeURIComponent(slug)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: title, fields }, null, 2),
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error || res.statusText);
      showToast(`Saved "${title}" to your components`);
      refreshComponents();
      return true;
    } catch (e) {
      showToast(`Could not save the component: ${e.message}`, true);
      return false;
    }
  }, [showToast, refreshComponents]);

  /* ---- add a loose (unconnected) step: palette click, component click, or a
     drop on empty canvas. Loose cards are clearly marked "not connected". ---- */
  const addLoose = useCallback((payload, pos) => {
    const flow = flowRef.current;
    if (!flow) { showToast("Create or open a flow first", true); return; }
    pushHistory();
    let id, nn;
    if (payload.kind === "component") {
      id = uniqueId(flow, slugify(payload.name) || "component");
      nn = componentSkeleton(payload);
    } else {
      id = uniqueId(flow, baseIdFor(payload.vtype));
      nn = newNodeSkeleton(payload.vtype);
    }
    flow.nodes[id] = nn;
    if (pos) {
      posRef.current[id] = pos;
    } else {
      // place below existing nodes so it never lands on top of another card
      const ys = Object.values(posRef.current).map((p) => p.y);
      const maxY = ys.length ? Math.max(...ys) : PAD;
      posRef.current[id] = { x: PAD, y: maxY + V_GAP };
    }
    setSelected(id);
    setShowFlowSettings(false);
    setDirty(true);
    bump();
    // Say / gather / action steps don't continue the call on their own (they
    // move on through their actions) — say so at creation, not at drag time.
    const noOnwardPath = payload.kind !== "component" &&
      ["say", "collect", "tool"].includes(payload.vtype);
    showToast(noOnwardPath
      ? `Added "${prettyStep(id)}" — not connected yet. To continue the call after it, follow it with an “Ask questions” step or give it an action.`
      : `Added "${prettyStep(id)}" — it isn't connected yet, so a call won't reach it.`, true);
  }, [bump, showToast, pushHistory]);
  const addNode = useCallback((vtype) => addLoose({ kind: "type", vtype }, null), [addLoose]);

  /* ---- drag from the left rail ---- */
  const beginDrag = useCallback((payload) => (e) => {
    dragPayloadRef.current = payload;
    e.dataTransfer.effectAllowed = "copy";
    try { e.dataTransfer.setData("text/plain", payload.kind === "component" ? payload.title : payload.vtype); } catch (_) { /* older engines */ }
    if (payloadInsertable(payload)) setDragInsert(true);
  }, []);
  const endDrag = useCallback(() => {
    dragPayloadRef.current = null;
    setDragInsert(false);
  }, []);
  // A drop that no seam claimed parks the card wherever it landed.
  const onCanvasDragOver = useCallback((e) => {
    if (dragPayloadRef.current) { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; }
  }, []);
  const onCanvasDrop = useCallback((e) => {
    const payload = dragPayloadRef.current;
    if (!payload || !flowRef.current) return;
    e.preventDefault();
    dragPayloadRef.current = null;
    setDragInsert(false);
    const inst = rfInst.current;
    let pos = null;
    if (inst) {
      if (inst.screenToFlowPosition) {
        pos = inst.screenToFlowPosition({ x: e.clientX, y: e.clientY });
      } else if (inst.project && canvasRef.current) {
        const b = canvasRef.current.getBoundingClientRect();
        pos = inst.project({ x: e.clientX - b.left, y: e.clientY - b.top });
      }
      if (pos) pos = { x: pos.x - 106, y: pos.y - 20 }; // center the card under the cursor
    }
    addLoose(payload, pos);
  }, [addLoose]);

  /* ---- React Flow interactions ---- */
  const onNodesChange = useCallback((changes) => {
    setRfNodes((nds) => {
      const next = applyNodeChanges(changes, nds);
      next.forEach((n) => { posRef.current[n.id] = n.position; });
      return next;
    });
  }, []);
  const onEdgesChange = useCallback((changes) => {
    setRfEdges((eds) => applyEdgeChanges(changes, eds));
  }, []);

  const onNodeClick = useCallback((_e, n) => { setShowFlowSettings(false); setSelectedEdge(null); setSelected(n.id); }, []);
  const onPaneClick = useCallback(() => { setSelected(null); setSelectedEdge(null); }, []);

  /* ---- port-drag routing: repoint ONE slot to a different step -------------
     The drag maps a grabbed port to its slot from the LIVE config (never from
     stale canvas data), then repointRoute changes that single value. One
     history snapshot per drop → one ⌘Z restores the previous route exactly. */
  const connectTo = useCallback((sourceId, sourceHandle, targetId) => {
    const flow = flowRef.current;
    if (!flow || !flow.nodes[sourceId] || !flow.nodes[targetId]) return;
    if (sourceId === targetId) return;         // self-routing: quiet reject
    const slot = portSlot(flow, sourceId, sourceHandle || null);
    if (!slot) { showToast(MSG_COMPLEX_PORT, true); return; }
    const prev = slotTarget(flow, slot);
    if (prev === targetId) return;             // already goes there: nothing to do
    pushHistory();                             // ONE snapshot per repoint
    repointRoute(flow, slot, targetId);
    // the release rule, made visible: the let-go route fades while the new lands
    if (prev && flow.nodes[prev]) {
      const fid = `fade:${++fadeSeq.current}`;
      fadeEdges.current.push({
        id: fid, source: sourceId, target: prev,
        ...(sourceHandle ? { sourceHandle } : {}),
        type: "flowEdge",
        style: { stroke: EDGE_COLOR, strokeWidth: 1.7 },
        markerEnd: { type: "arrowclosed", color: EDGE_COLOR, width: 15, height: 15 },
        data: { fading: true },
      });
      setTimeout(() => {
        fadeEdges.current = fadeEdges.current.filter((e) => e.id !== fid);
        bump();
      }, 550);
    }
    setDirty(true);
    bump();
    showToast(prev && flow.nodes[prev]
      ? `Now goes to "${prettyStep(targetId)}". "${prettyStep(prev)}" is no longer on this path.`
      : `Now goes to "${prettyStep(targetId)}".`);
  }, [pushHistory, bump, showToast]);

  const onConnect = useCallback((c) => {
    didConnect.current = true;
    connectTo(c.source, c.sourceHandle, c.target);
  }, [connectTo]);
  const onConnectStart = useCallback((_e, params) => {
    didConnect.current = false;
    connStart.current = params;
    setConnecting(true);
  }, []);
  // "Drop on a card" — releasing ANYWHERE on a target card must commit, not
  // just exact handle hits. Resolve the card under the cursor by coordinates
  // (never by event.target ancestry — the pointer is captured by the source
  // handle during a connection), and treat a release within a small radius of
  // any card's top handle as a hit. A drop that resolves nothing never fails
  // silently: a quiet toast says the drop missed.
  const resolveDropNode = (x, y) => {
    const el = document.elementFromPoint(x, y);
    const nodeEl = el && el.closest ? el.closest(".react-flow__node") : null;
    if (nodeEl) return nodeEl.getAttribute("data-id");
    let best = null, bestD = 36; // px — near-misses just above a card still land
    document.querySelectorAll(".react-flow__node .react-flow__handle-top").forEach((h) => {
      const r = h.getBoundingClientRect();
      const d = Math.hypot(x - (r.left + r.width / 2), y - (r.top + r.height / 2));
      if (d < bestD) { bestD = d; best = h.closest(".react-flow__node"); }
    });
    return best ? best.getAttribute("data-id") : null;
  };
  const onConnectEnd = useCallback((evt) => {
    setConnecting(false);
    const start = connStart.current;
    connStart.current = null;
    if (didConnect.current || !start || start.handleType !== "source") return;
    const x = evt.clientX ?? (evt.changedTouches && evt.changedTouches[0] && evt.changedTouches[0].clientX);
    const y = evt.clientY ?? (evt.changedTouches && evt.changedTouches[0] && evt.changedTouches[0].clientY);
    if (x == null || y == null) return;
    const targetId = resolveDropNode(x, y);
    if (targetId) connectTo(start.nodeId, start.handleId, targetId);
    else showToast("That didn't land — drop on a card to send the call there.");
  }, [connectTo, showToast]);

  // Clicking an arrow: select it when its route can be removed; otherwise be
  // honest about why it can't.
  const onEdgeClick = useCallback((_e, edge) => {
    if (edge.data && edge.data.fading) return;
    if (edge.data && edge.data.slotRef) {
      setSelected(null);
      setShowFlowSettings(false);
      setSelectedEdge(edge.id);
    } else {
      setSelectedEdge(null);
      showToast((edge.data && edge.data.blockedMsg) || MSG_COMPLEX_PORT, true);
    }
  }, [showToast]);

  const flow = flowRef.current;
  const nodeIdList = flow ? Object.keys(flow.nodes || {}) : [];
  const typeLabel = Object.fromEntries(NODE_TYPES.map((t) => [t.key, t.label]));

  return html`
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <div class="mark">P</div>
          <div>
            <div class="title">Flow Builder</div>
            <div class="clinic">__CLINIC_NAME__</div>
          </div>
        </div>

        <div class="divider"></div>
        <button onClick=${() => { refreshList(); setShowOpen(true); }}><${Icon} name="open" /> Open flow</button>
        <button onClick=${createNew}><${Icon} name="plus" /> New</button>

        <div class="divider"></div>
        <button class="iconbtn" title="Undo (⌘Z)" onClick=${undo}
                disabled=${!flow || undoStack.current.length === 0}><${Icon} name="undo" /></button>
        <button class="iconbtn" title="Redo (⌘⇧Z)" onClick=${redo}
                disabled=${!flow || redoStack.current.length === 0}><${Icon} name="redo" /></button>

        <div class="divider"></div>
        <div class="seg">
          <button class=${view === "map" ? "on" : ""} disabled=${!flow}
                  onClick=${() => setView("map")}>Map</button>
          <button class=${view === "outline" ? "on" : ""} disabled=${!flow} title="Read-only call script"
                  onClick=${() => setView("outline")}>Outline</button>
        </div>

        <div class="spacer"></div>

        ${flow && html`
          <div class=${"filepill" + (dirty ? " unsaved" : "")}>
            <span class="dot"></span>
            <span class="fn">${loadedName ? `${loadedName}.json` : "Unsaved flow"}${dirty ? " • edited" : ""}</span>
          </div>`}

        <div class="divider"></div>
        <button onClick=${() => { setSelected(null); setShowFlowSettings((s) => !s); }} disabled=${!flow}><${Icon} name="settings" /> Flow settings</button>
        <button onClick=${exportJson} disabled=${!flow}>Export</button>
        <button onClick=${() => setSavePrompt({ initial: loadedName, copy: false })} disabled=${!flow}>Save as…</button>
        <button class="primary" onClick=${onSave} disabled=${!flow}>Save</button>
        <a class="navlink" href="/phone" target="_blank">/phone ↗</a>
      </div>

      <div class="body">
        <!-- left rail: step types · my components · templates -->
        <div class="palette">
          <div class="tip">
            <${Icon} name="cursor" size=${15} />
            <div>Drag a step onto a <strong>line</strong> between two cards — it wires itself in. Drag a card's <strong>bottom dot</strong> to another card to change where it goes.</div>
          </div>
          ${RAIL.map((sec) => html`
            <div class="rail-sec" key=${sec.title}>
              <div class="sec-h">${sec.title}</div>
              ${sec.keys.map((key) => {
                const cat = CAT_META[CATEGORY[key]];
                return html`
                  <button key=${key} class="pal-item" draggable="true"
                    onDragStart=${beginDrag({ kind: "type", vtype: key })} onDragEnd=${endDrag}
                    onClick=${() => addNode(key)}
                    title=${"Drag onto the map — or click to add it unconnected"}>
                    <span class="swatch" style=${{ background: cat.color }}></span>
                    <span class="pi-body"><span class="pi-name">${typeLabel[key]}</span></span>
                  </button>`;
              })}
            </div>`)}

          <div class="rail-sec">
            <div class="sec-h">My components</div>
            ${components.length === 0 && html`
              <div class="rail-empty">Reusable pieces you can drop into any flow — save a set of questions once, use it everywhere.</div>`}
            ${components.map((c) => html`
              <button key=${c.name} class="pal-item" draggable="true"
                onDragStart=${beginDrag({ kind: "component", name: c.name, title: c.title, fields: c.fields })}
                onDragEnd=${endDrag}
                onClick=${() => addLoose({ kind: "component", name: c.name, title: c.title, fields: c.fields }, null)}
                title=${"Drag onto the map — or click to add it unconnected"}>
                <span class="swatch" style=${{ background: "var(--cat-conv)" }}></span>
                <span class="pi-body">
                  <span class="pi-name">${c.title}</span>
                  <span class="pi-sub">${(c.fields || []).length} question${(c.fields || []).length === 1 ? "" : "s"}</span>
                </span>
              </button>`)}
            <button class="pal-item" onClick=${() => setShowNewComponent(true)} style=${{ cursor: "pointer" }}>
              <${Icon} name="plus" size=${14} />
              <span class="pi-body"><span class="pi-name">New component</span></span>
            </button>
          </div>

          <div class="rail-sec">
            <div class="sec-h">Templates</div>
            ${flowList.filter((f) => f.template).length === 0 && html`
              <div class="rail-empty">Curated starting points appear here. Your own flows live under Open flow.</div>`}
            ${flowList.filter((f) => f.template).map((f) => html`
              <button key=${f.name} class="pal-item" onClick=${() => useTemplate(f)}
                style=${{ cursor: "pointer" }}
                title=${f.name === loadedName ? "This is the flow you're editing" : "Start from a copy of this flow"}>
                <${Icon} name="file" size=${14} />
                <span class="pi-body">
                  <span class="pi-name">${f.title || f.name}</span>
                  <span class="pi-sub">${f.file}</span>
                </span>
                ${f.name === loadedName && html`<span class="inuse">In use</span>`}
              </button>`)}
          </div>
        </div>

        <!-- canvas -->
        <div class=${"canvas" + (connecting ? " connecting" : "")} ref=${canvasRef}
             onDragOver=${onCanvasDragOver} onDrop=${onCanvasDrop}>
          ${flow && view === "outline"
            ? html`<${Outline} flow=${flow} selected=${selected}
                      onPick=${(id) => { setShowFlowSettings(false); setSelected(id); }} />`
            : flow
            ? html`<${ReactFlow}
                key=${viewKey}
                nodes=${rfNodes} edges=${rfEdges}
                nodeTypes=${nodeTypes} edgeTypes=${edgeTypes}
                onInit=${(inst) => { rfInst.current = inst; }}
                onNodesChange=${onNodesChange} onEdgesChange=${onEdgesChange}
                onConnect=${onConnect} onConnectStart=${onConnectStart} onConnectEnd=${onConnectEnd}
                connectionLineType="smoothstep"
                connectionLineStyle=${{ stroke: "#5E78EE", strokeWidth: 2, opacity: 0.9 }}
                connectionRadius=${40}
                isValidConnection=${(c) => c.source !== c.target}
                onNodeClick=${onNodeClick} onPaneClick=${onPaneClick} onEdgeClick=${onEdgeClick}
                onNodeDragStart=${pushHistory}
                deleteKeyCode=${null} zoomOnDoubleClick=${false}
                fitView minZoom=${0.2} proOptions=${{ hideAttribution: true }}>
                <${Background} gap=${22} size=${1.4} color="#dfe3f0" />
                <${Controls} showInteractive=${false} />
                <${MiniMap} nodeColor=${(n) => colorFor(n.data.node)} nodeStrokeWidth=${2} pannable zoomable />
              <//>`
            : html`<div class="empty" style=${{ marginTop: "18vh", color: "var(--muted)", fontSize: "13.5px", textAlign: "center", padding: "0 20px", lineHeight: 1.6 }}>
                <span class="big" style=${{ display: "block", marginBottom: "12px" }}><${Icon} name="flow" size=${36} /></span>
                Open an existing clinic flow, or create a new one to start building.
                <div style=${{ marginTop: "18px" }}>
                  <button class="primary" onClick=${() => { refreshList(); setShowOpen(true); }}><${Icon} name="open" /> Open a flow</button>
                </div>
              </div>`}
        </div>

        <!-- properties / flow settings -->
        <div class="panel">
          ${showFlowSettings && flow
            ? html`<${FlowSettings} flow=${flow} markDirty=${markDirty} pushHistory=${pushHistory} onClose=${() => setShowFlowSettings(false)} />`
            : (selected && flow && flow.nodes[selected]
                ? html`<${Props} key=${selected} flow=${flow} nodeId=${selected}
                          nodeIds=${nodeIdList} markDirty=${markDirty} pushHistory=${pushHistory}
                          renameNode=${renameNode} requestDelete=${requestDelete}
                          showToast=${showToast} />`
                : html`<div class="empty">
                    <span class="big"><${Icon} name="cursor" size=${34} /></span>
                    ${flow ? "Click a card to edit what it says, or drag a step in from the left." : "No flow open yet."}
                  </div>`)}
        </div>
      </div>

      ${showOpen && html`<${OpenModal} flows=${flowList} onPick=${loadFlow} onClose=${() => setShowOpen(false)} />`}
      ${savePrompt && html`<${SaveModal} initial=${savePrompt.initial} copy=${savePrompt.copy}
                            flowName=${flow && flow.name}
                            onSave=${doSave} onClose=${() => setSavePrompt(null)} />`}
      ${showNewComponent && html`<${ComponentModal}
                            onSave=${async (v) => { if (await saveComponent(v)) setShowNewComponent(false); }}
                            onClose=${() => setShowNewComponent(false)} />`}
      ${confirmBox && html`<${ConfirmModal} ...${confirmBox} onCancel=${() => setConfirmBox(null)} />`}

      ${toast && html`<div class=${"toast" + (toast.err ? " err" : "")}>
        <span class="toast-ic">${toast.err ? "!" : "✓"}</span>${toast.msg}</div>`}
    </div>`;
}

/* ---- Open-flow picker modal ----------------------------------------------- */
function OpenModal({ flows, onPick, onClose }) {
  return html`
    <div class="overlay" onClick=${onClose}>
      <div class="modal" onClick=${(e) => e.stopPropagation()}>
        <div class="modal-head">
          <div>
            <h3>Open a clinic flow</h3>
            <div class="sub">Pick a saved flow to edit. Click a card to open it.</div>
          </div>
          <button class="modal-x" onClick=${onClose}>✕</button>
        </div>
        <div class="modal-body">
          ${flows.length === 0
            ? html`<div class="flow-empty">No saved flows yet. Close this and hit <strong>+ New</strong> to build one.</div>`
            : html`<div class="flow-grid">
                ${flows.map((f) => html`
                  <button class="flow-card" key=${f.name} onClick=${() => onPick(f.name)}>
                    <div class="fc-icon"><${Icon} name="file" size=${18} /></div>
                    <div class="fc-title">${f.title || f.name}</div>
                    <div class="fc-file">${f.file}</div>
                  </button>`)}
              </div>`}
        </div>
        <div class="modal-foot"><button onClick=${onClose}>Cancel</button></div>
      </div>
    </div>`;
}

/* ---- Save-as modal (also the "save your own copy" prompt for templates) ---- */
function SaveModal({ initial, copy, flowName, onSave, onClose }) {
  const [name, setName] = useState(initial || "");
  const valid = /^[A-Za-z0-9_-]+$/.test(name.trim());
  const submit = () => { if (valid) onSave(name); };
  return html`
    <div class="overlay" onClick=${onClose}>
      <div class="modal sm" onClick=${(e) => e.stopPropagation()}>
        <div class="modal-head">
          <div>
            <h3>${copy ? "Save as your own copy" : "Save flow"}</h3>
            <div class="sub">${copy
              ? "The template stays untouched — you'll edit this copy."
              : html`Saves ${flowName ? html`“${flowName}”` : "this flow"} into the clinic's flows folder.`}</div>
          </div>
          <button class="modal-x" onClick=${onClose}>✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>File name</label>
            <div class="prefix">
              <input type="text" autoFocus value=${name}
                     placeholder="e.g. penciled_test_clinic"
                     onInput=${(e) => setName(e.target.value)}
                     onKeyDown=${(e) => { if (e.key === "Enter") submit(); }} />
              <span class="suffix">.json</span>
            </div>
            <span class="hint">${name && !valid
              ? "Use letters, numbers, hyphens and underscores only."
              : "Letters, numbers, hyphens and underscores. Saving an existing name overwrites it."}</span>
          </div>
        </div>
        <div class="modal-foot">
          <button onClick=${onClose}>Cancel</button>
          <button class="primary" onClick=${submit} disabled=${!valid}>${copy ? "Save my copy" : "Save flow"}</button>
        </div>
      </div>
    </div>`;
}

/* ---- New-component modal ---------------------------------------------------
   Name + what the assistant should say or ask (one question per line). Saving
   derives storage keys with the existing suggestion logic and POSTs to the
   component library. */
function ComponentModal({ onSave, onClose }) {
  const [name, setName] = useState("");
  const [questions, setQuestions] = useState("");
  const [busy, setBusy] = useState(false);
  const valid = name.trim().length > 0 && questions.split("\n").some((s) => s.trim());
  const submit = async () => {
    if (!valid || busy) return;
    setBusy(true);
    await onSave({ name, questions });
    setBusy(false);
  };
  return html`
    <div class="overlay" onClick=${onClose}>
      <div class="modal sm" onClick=${(e) => e.stopPropagation()}>
        <div class="modal-head">
          <div>
            <h3>New component</h3>
            <div class="sub">A reusable piece you can drag into any flow.</div>
          </div>
          <button class="modal-x" onClick=${onClose}>✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>Name</label>
            <input type="text" class="full" autoFocus value=${name}
                   placeholder="e.g. Insurance details"
                   onInput=${(e) => setName(e.target.value)} />
          </div>
          <div class="field">
            <label>What should the assistant say or ask?</label>
            <textarea rows=${5} value=${questions}
              placeholder=${"One question per line, e.g.\nWhich insurance carrier do you have?\nWhat's your member ID?"}
              onInput=${(e) => setQuestions(e.target.value)}></textarea>
            <span class="hint">One question per line — each is asked on the call exactly as written.</span>
          </div>
        </div>
        <div class="modal-foot">
          <button onClick=${onClose}>Cancel</button>
          <button class="primary" onClick=${submit} disabled=${!valid || busy}>Save to library</button>
        </div>
      </div>
    </div>`;
}

/* ---- generic confirm modal ------------------------------------------------ */
function ConfirmModal({ title, message, confirmLabel, tone, onConfirm, onCancel }) {
  return html`
    <div class="overlay" onClick=${onCancel}>
      <div class="modal sm" onClick=${(e) => e.stopPropagation()}>
        <div class="modal-head"><h3>${title}</h3><button class="modal-x" onClick=${onCancel}>✕</button></div>
        <div class="modal-body"><p style=${{ margin: "4px 0 12px", color: "var(--ink-soft)", lineHeight: 1.55 }}>${message}</p></div>
        <div class="modal-foot">
          <button onClick=${onCancel}>Cancel</button>
          <button class=${tone === "primary" ? "primary" : "danger"} onClick=${onConfirm}>${confirmLabel || "Confirm"}</button>
        </div>
      </div>
    </div>`;
}

/* ---- flow-level settings (persona / name / initial) ----------------------- */
function FlowSettings({ flow, markDirty, pushHistory, onClose }) {
  const [, force] = useState(0);
  const set = (k, v) => { pushHistory(`flow:${k}`); flow[k] = v; force((n) => n + 1); markDirty(); };
  return html`
    <div class="panel-h"><${Icon} name="settings" /><h2>Flow settings</h2></div>
    <div class="field">
      <label>Flow name <span class="hint inline">(shown in the picker)</span></label>
      <input type="text" class="full" value=${flow.name || ""}
             onChange=${(e) => set("name", e.target.value)} />
    </div>
    <div class="field">
      <label>First step <span class="hint inline">(where every call begins)</span></label>
      <select class="full" value=${flow.initial_node || ""}
              onChange=${(e) => set("initial_node", e.target.value)}>
        ${Object.keys(flow.nodes || {}).map((id) => html`<option key=${id} value=${id}>${prettyStep(id)}</option>`)}
      </select>
    </div>
    <div class="field">
      <label>Persona</label>
      <textarea rows=${10} value=${flow.persona || ""} onChange=${(e) => set("persona", e.target.value)}></textarea>
      <span class="hint">The assistant's voice & personality. Supports <code>{CLINIC_NAME}</code> and <code>{ASSISTANT_NAME}</code>.</span>
    </div>
    <div class="section-sep"></div>
    <button onClick=${onClose}>Close settings</button>`;
}

/* ---- collapsible "Advanced" section (closed by default) -------------------- */
function Advanced({ children }) {
  const [open, setOpen] = useState(false);
  return html`
    <div class="adv">
      <button class="adv-toggle" onClick=${() => setOpen((o) => !o)}>
        <span class=${"adv-caret" + (open ? " open" : "")}>▸</span> Advanced
      </button>
      ${open && html`<div class="adv-body">${children}</div>`}
    </div>`;
}

/* ---- per-node properties panel ---------------------------------------------
   Progressive disclosure: what a GTM user edits (name, what's said, questions,
   where it goes next) comes first; technical settings (available actions,
   required/answer type, context reset) live behind "Advanced ▸". Every
   mutation snapshots history first, so ⌘Z covers field edits too. */
function Props({ flow, nodeId, nodeIds, markDirty, pushHistory, renameNode, requestDelete, showToast }) {
  const node = flow.nodes[nodeId];
  const [, force] = useState(0);
  const touch = () => { force((n) => n + 1); markDirty(); };
  // one undo step per edit, snapshotted BEFORE the mutation; a `key` marks
  // keystroke-level edits to one field so they coalesce into a single step
  const edit = (fn, key) => { pushHistory(key ? `${nodeId}:${key}` : undefined); fn(); touch(); };
  const vt = visualType(node);
  const cat = catFor(vt);
  const allFns = Object.keys(flow.functions || {});

  // Editable step id (rename). Committed on blur / Enter; delegates to the
  // shared rename logic that rewrites every routing reference.
  const [idDraft, setIdDraft] = useState(nodeId);
  const [idErr, setIdErr] = useState("");
  const incoming = new Set(computeEdges(flow).map((e) => e.target));
  const isOrphan = flow.initial_node !== nodeId && !incoming.has(nodeId);
  const commitId = () => {
    const nid = idDraft.trim();
    if (nid === nodeId) { setIdErr(""); return; }
    const err = renameNode(nodeId, nid);
    setIdErr(err || "");   // on success Props remounts (key=selected) with the new id
  };

  const setField = (k, v) => edit(() => { node[k] = v; }, k);
  const delField = (k) => edit(() => { delete node[k]; });

  const toggleFn = (fn) => edit(() => {
    const cur = node.functions || [];
    node.functions = cur.includes(fn) ? cur.filter((x) => x !== fn) : [...cur, fn];
  });

  const setInitial = () => {
    edit(() => { flow.initial_node = nodeId; });
    showToast(`"${prettyStep(nodeId)}" is now the first step`);
  };

  const hasFns = ["say", "collect", "branch", "tool", "handoff", "end", "collect-custom"].includes(vt);
  // True when this node's exposed functions actually decide where the call
  // goes next, so we only surface that note when it applies.
  const routesViaFns = (node.functions || []).some((fn) => {
    const def = (flow.functions || {})[fn];
    return def && behaviorTargets(def.behavior).length > 0;
  });

  return html`
    <div class="panel-h">
      <span class="badge" style=${{ background: cat.bg, color: cat.color }}>${TYPE_LABEL[vt] || vt}</span>
      <h2>Edit step</h2>
    </div>

    ${isOrphan && html`
      <div class="note warn" style=${{ marginBottom: "14px" }}>
        <${Icon} name="warn" size=${14} />
        <div>This step isn't connected — nothing leads to it, so a call never reaches it.
          Drag another card's bottom dot onto this card, or drop a new step onto a line.</div>
      </div>`}

    <div class="field">
      <label>Step name <span class="hint inline">(letters, numbers, _ and -)</span></label>
      <input class="full" type="text" value=${idDraft}
             onInput=${(e) => { setIdDraft(e.target.value); if (idErr) setIdErr(""); }}
             onBlur=${commitId}
             onKeyDown=${(e) => { if (e.key === "Enter") e.target.blur(); }} />
      ${idErr
        ? html`<span class="hint" style=${{ color: "var(--err)" }}>${idErr}</span>`
        : html`<span class="hint">Renaming updates everything that points here. Tip: you can also double-click the name on the card.</span>`}
    </div>

    <div class="field">
      ${flow.initial_node === nodeId
        ? html`<span class="initial-tag"><${Icon} name="flag" size=${12} /> First step</span>`
        : html`<button class="tiny" onClick=${setInitial}>Make this the first step</button>`}
    </div>

    ${node.type === "categorize" && html`
      <div class="field">
        <label>Prompt <span class="hint inline">(what the assistant asks)</span></label>
        <textarea rows=${3} value=${node.prompt || ""} onChange=${(e) => setField("prompt", e.target.value)}></textarea>
      </div>
      <div class="field">
        <label>Options</label>
        <span class="hint" style=${{ marginTop: 0, marginBottom: "8px" }}>Each option sends the caller to a different step based on what they say.</span>
        ${(node.buckets || []).map((b, i) => html`
          <div class="subcard" key=${i}>
            <div class="smalllbl">name</div>
            <div class="row"><input type="text" value=${b.name || ""}
              onChange=${(e) => edit(() => { b.name = e.target.value; }, `bucket${i}.name`)} /></div>
            <div class="smalllbl">description</div>
            <div class="row"><input type="text" value=${b.description || ""}
              onChange=${(e) => edit(() => { b.description = e.target.value; }, `bucket${i}.desc`)} /></div>
            <div class="smalllbl">goes to</div>
            <div class="row">
              <select value=${b.next || ""} onChange=${(e) => edit(() => { b.next = e.target.value; })}>
                <option value="">— choose a step —</option>
                ${nodeIds.map((id) => html`<option key=${id} value=${id}>${prettyStep(id)}</option>`)}
              </select>
              <button class="danger tiny" onClick=${() => edit(() => { node.buckets.splice(i, 1); })}>✕</button>
            </div>
          </div>`)}
        <button class="tiny" onClick=${() => edit(() => { (node.buckets = node.buckets || []).push({ name: "", description: "", next: "" }); })}>+ Add option</button>
      </div>
      <div class="field">
        <label>If nothing matches <span class="hint inline">(when no option fits)</span></label>
        <select class="full" value=${node.fallback || ""} onChange=${(e) => setField("fallback", e.target.value)}>
          <option value="">— choose a step —</option>
          ${nodeIds.map((id) => html`<option key=${id} value=${id}>${prettyStep(id)}</option>`)}
        </select>
      </div>`}

    ${vt === "collect-custom" && html`
      <div class="field">
        <label>Questions to ask <span class="hint inline">(each is asked once, exactly as written)</span></label>
        ${(node.fields || []).map((f, i) => html`
          <div class="subcard" key=${i}>
            <div class="smalllbl">question (spoken to the caller)</div>
            <div class="row">
              <input type="text" placeholder="e.g. Which pharmacy do you use?" value=${f.question || ""}
                onChange=${(e) => edit(() => { f.question = e.target.value; }, `q${i}.question`)}
                onBlur=${() => {
                  // convenience: derive a storage key from the question if none set
                  if (!f.field && f.question) {
                    const s = suggestFieldKey(f.question);
                    if (s) edit(() => { f.field = s; });
                  }
                }} />
              <button class="danger tiny" title="Remove this question"
                onClick=${() => edit(() => { node.fields.splice(i, 1); })}>✕</button>
            </div>
            <div class="smalllbl">saved as</div>
            <div class="row"><input type="text" placeholder="e.g. pharmacy" value=${f.field || ""}
              onChange=${(e) => edit(() => { f.field = e.target.value; }, `q${i}.field`)}
              onBlur=${(e) => { const n = normalizeFieldKey(e.target.value); if (n !== f.field) edit(() => { f.field = n; }, `q${i}.field`); }} /></div>
          </div>`)}
        <button class="tiny" onClick=${() => edit(() => { (node.fields = node.fields || []).push({ question: "", field: "", required: false }); })}>+ Add question</button>
        <span class="hint">Write each question once — it's spoken exactly as written. There's no separate prompt to repeat it in.</span>
      </div>
      <div class="field">
        <label>Next step <span class="hint inline">(after all answers collected)</span></label>
        <select class="full" value=${node.next || ""} onChange=${(e) => setField("next", e.target.value)}>
          <option value="">— choose a step —</option>
          ${nodeIds.map((id) => html`<option key=${id} value=${id}>${prettyStep(id)}</option>`)}
        </select>
      </div>`}

    ${(node.type === "say" || node.type === "branch" || node.type === "tool" ||
       node.type === "handoff" || node.type === "end" ||
       (node.type === "collect" && vt !== "collect-custom")) && html`
      <div class="field">
        <label>Instructions</label>
        <textarea rows=${7} value=${node.instructions || ""} onChange=${(e) => setField("instructions", e.target.value)}></textarea>
        <span class="hint">What the assistant should say or do here. Supports <code>{CLINIC_NAME}</code> and <code>{ASSISTANT_NAME}</code>.</span>
      </div>
      ${(CATEGORY[vt] === "conversation" || CATEGORY[vt] === "integration")
        && !routesViaFns && !linearSlot(flow, nodeId) && html`
        <div class="note plain">
          This kind of step won't continue the call by itself — the call moves on
          through its actions. Follow it with an “Ask questions” step, or give it
          an action under Advanced.
        </div>`}`}

    <${Advanced}>
      ${vt === "collect-custom" && html`
        <div class="field">
          <label>Intro line <span class="hint inline">(optional — spoken once, before the questions)</span></label>
          <textarea rows=${2} value=${node.prompt || ""}
            onChange=${(e) => {
              const v = e.target.value;
              edit(() => { if (v.trim()) node.prompt = v; else delete node.prompt; }, "intro");
            }}></textarea>
          <span class="hint">Leave blank for the built-in intro. Don't repeat a question here — each question above is already asked on the call.</span>
        </div>
        ${(node.fields || []).length > 0 && html`
          <div class="field">
            <label>Answer requirements</label>
            ${(node.fields || []).map((f, i) => html`
              <div class="row" key=${i} style=${{ marginBottom: "7px" }}>
                <span style=${{ flex: 1, minWidth: 0, fontSize: "12.5px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontFamily: "ui-monospace,SFMono-Regular,Menlo,monospace" }}>
                  ${f.field || `question ${i + 1}`}</span>
                <label class="chk"><input type="checkbox" checked=${!!f.required}
                  onChange=${(e) => edit(() => { f.required = e.target.checked; })} /> required</label>
                <select value=${f.type || "string"} onChange=${(e) => edit(() => { f.type = e.target.value; })}>
                  <option value="string">text</option>
                  <option value="boolean">yes / no</option>
                  <option value="number">number</option>
                </select>
              </div>`)}
          </div>`}`}

      ${node.dynamic && html`
        <div class="field">
          <div class="note plain">This step has a <strong>dynamic</strong> block
            (<code>${node.dynamic.var}</code> from <code>${node.dynamic.source}</code>). Preserved exactly as-is when you save.</div>
        </div>`}

      ${hasFns && html`
        <div class="field">
          <label>Actions <span class="hint inline">(things the assistant can do at this step)</span></label>
          ${allFns.length === 0
            ? html`<span class="hint">No actions are defined in this flow yet.</span>`
            : html`<div class="fnlist">
                ${allFns.map((fn) => html`
                  <label class="chk" key=${fn}>
                    <input type="checkbox" checked=${(node.functions || []).includes(fn)}
                           onChange=${() => toggleFn(fn)} /> ${humanize(fn)}
                  </label>`)}
              </div>`}
        </div>
        ${routesViaFns && html`
          <div class="note" style=${{ margin: "4px 0 14px" }}>
            Where the call goes after this step is decided by its actions above.
          </div>`}`}

      <div class="field">
        <label class="chk">
          <input type="checkbox" checked=${node.context === "reset"}
                 onChange=${(e) => { e.target.checked ? setField("context", "reset") : delField("context"); }} />
          Reset conversation context when entering this step
        </label>
      </div>
    <//>

    <div class="field" style=${{ marginTop: "22px" }}>
      <button class="danger" onClick=${() => requestDelete(nodeId)}>Delete this step</button>
    </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
