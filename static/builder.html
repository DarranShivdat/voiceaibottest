<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flow Builder — __CLINIC_NAME__</title>

<!-- React Flow via esm.sh CDN (same self-contained pattern /phone uses for its SDK).
     No build step: React + reactflow are pinned in the importmap and the app is
     written with htm (JSX-like templates bound to React.createElement). -->
<link rel="stylesheet" href="https://esm.sh/reactflow@11.11.4/dist/style.css" />
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "reactflow": "https://esm.sh/reactflow@11.11.4?external=react,react-dom",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>

<style>
  :root {
    /* Penciled brand */
    --brand:#5E78EE; --brand-600:#4a62d8; --brand-700:#3d53c4; --brand-50:#eef1fe; --brand-100:#e0e6fd;
    /* neutrals (cool slate) */
    --ink:#1c2333; --ink-soft:#3a4256; --muted:#7a8397; --line:#e7e9f2; --line-soft:#f0f2f8;
    --bg:#f5f6fc; --panel:#ffffff;
    /* step-category accents: what a step DOES, not its technical type.
       conversation (say/collect) · decision (branch/categorize) ·
       integration (tool) · terminal (end/handoff) */
    --cat-conv:#5E78EE;  --cat-conv-bg:#eef1fe;
    --cat-dec:#e8930c;   --cat-dec-bg:#fdf3e3;
    --cat-int:#0f9d8f;   --cat-int-bg:#e6f7f3;
    --cat-term:#d95d6d;  --cat-term-bg:#fdeef0;
    --edge:#aab2c8;
    --ok:#10b981; --err:#ef4444;
    --shadow-sm:0 1px 2px rgba(28,35,51,.06);
    --shadow-md:0 4px 16px rgba(28,35,51,.10);
    --shadow-lg:0 12px 40px rgba(28,35,51,.18);
  }
  * { box-sizing:border-box; }
  html, body, #root { height:100%; margin:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); overflow:hidden;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .app { display:flex; flex-direction:column; height:100vh; }

  /* ---- Top bar ---- */
  .topbar {
    display:flex; align-items:center; gap:10px; padding:0 18px; height:60px;
    background:var(--panel); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .brand { display:flex; align-items:center; gap:10px; margin-right:6px; }
  .brand .mark {
    width:30px; height:30px; border-radius:9px; flex-shrink:0;
    background:linear-gradient(135deg,var(--brand),var(--brand-700));
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px;
    box-shadow:0 2px 6px rgba(94,120,238,.4);
  }
  .brand .title { font-size:15px; font-weight:700; color:var(--ink); letter-spacing:-.01em; white-space:nowrap; }
  .brand .clinic { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .topbar .spacer { flex:1; }
  .filepill {
    display:flex; align-items:center; gap:8px; padding:5px 12px; border-radius:999px;
    background:var(--brand-50); border:1px solid var(--brand-100); color:var(--brand-700);
    font-size:12.5px; font-weight:650; max-width:340px;
  }
  .filepill .dot { width:7px; height:7px; border-radius:50%; background:var(--brand); flex-shrink:0; }
  .filepill .fn { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .filepill.unsaved { background:#fff7ed; border-color:#fed7aa; color:#c2620c; }
  .filepill.unsaved .dot { background:#f59e0b; }

  .divider { width:1px; height:28px; background:var(--line); margin:0 2px; }

  /* ---- inputs & buttons ---- */
  select, input[type=text], textarea {
    font:inherit; color:var(--ink); border:1px solid var(--line); border-radius:9px;
    padding:9px 11px; background:#fff; transition:border-color .12s, box-shadow .12s;
  }
  select:focus, input[type=text]:focus, textarea:focus {
    outline:none; border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-50);
  }
  textarea { width:100%; resize:vertical; line-height:1.5; }
  button {
    font:inherit; font-size:13.5px; font-weight:650; border:1px solid var(--line); border-radius:9px;
    padding:8px 14px; background:#fff; cursor:pointer; color:var(--ink-soft); white-space:nowrap;
    transition:background .12s, border-color .12s, box-shadow .12s, color .12s;
    display:inline-flex; align-items:center; gap:6px;
  }
  button:hover { background:var(--line-soft); border-color:#d7dbe8; }
  button.primary { background:var(--brand); border-color:var(--brand); color:#fff; box-shadow:0 2px 6px rgba(94,120,238,.3); }
  button.primary:hover { background:var(--brand-600); border-color:var(--brand-600); }
  button.ghost { border-color:transparent; background:transparent; color:var(--brand-700); }
  button.ghost:hover { background:var(--brand-50); }
  button.danger { color:#b91c1c; border-color:#fecaca; background:#fef2f2; }
  button.danger:hover { background:#fee2e2; }
  button.tiny { padding:4px 8px; font-size:12px; border-radius:7px; }
  button:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }

  /* ---- body layout ---- */
  .body { flex:1; display:flex; min-height:0; }

  /* left rail */
  .palette {
    width:228px; background:var(--panel); border-right:1px solid var(--line); padding:16px 14px 30px;
    overflow:auto; flex-shrink:0;
  }
  .side-h {
    font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted);
    font-weight:700; margin:0 0 8px; padding-left:2px;
  }
  .rail-sec { margin-bottom:18px; }
  .rail-sec .sec-h {
    display:flex; align-items:center; gap:7px; font-size:11px; font-weight:750;
    text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 7px; padding-left:2px;
  }
  .pal-item {
    display:flex; align-items:center; gap:10px; width:100%; text-align:left; justify-content:flex-start;
    margin-bottom:6px; padding:8px 10px; font-size:13px; color:var(--ink); font-weight:600;
    border:1px solid var(--line); border-radius:10px; background:#fff; cursor:grab;
  }
  .pal-item:hover { border-color:var(--brand-100); background:var(--brand-50); }
  .pal-item:active { cursor:grabbing; }
  .pal-item .pi-body { min-width:0; flex:1; display:block; }
  .pal-item .pi-name { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pal-item .pi-sub { display:block; font-size:11px; color:var(--muted); font-weight:500; margin-top:1px;
                      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .swatch { width:12px; height:12px; border-radius:4px; flex-shrink:0; }
  .inuse {
    flex-shrink:0; font-size:10px; font-weight:750; letter-spacing:.03em; color:#0b7a5e;
    background:#e6f7f1; border:1px solid #bfe9db; border-radius:999px; padding:2px 8px;
  }
  .rail-empty { font-size:11.5px; color:var(--muted); padding:2px 2px 6px; line-height:1.45; }

  .canvas { flex:1; min-width:0; position:relative; }

  /* right panel */
  .panel {
    width:360px; background:var(--panel); border-left:1px solid var(--line); padding:18px 18px 40px;
    overflow:auto; flex-shrink:0;
  }
  .panel-h { display:flex; align-items:center; gap:8px; margin:0 0 16px; }
  .panel-h h2 { font-size:15px; font-weight:700; margin:0; color:var(--ink); }
  .panel .empty {
    color:var(--muted); font-size:13.5px; margin-top:60px; text-align:center; padding:0 20px; line-height:1.6;
  }
  .panel .empty .big { display:block; font-size:34px; margin-bottom:12px; opacity:.5; }

  .field { margin-bottom:16px; }
  .field > label { display:block; font-size:12.5px; font-weight:650; color:var(--ink-soft); margin-bottom:6px; }
  .field .hint { display:block; font-size:11.5px; color:var(--muted); font-weight:400; margin-top:5px; line-height:1.45; }
  .field .hint.inline { display:inline; margin-top:0; }
  .full { width:100%; }
  .row { display:flex; gap:8px; align-items:center; }
  .row > input[type=text], .row > select { flex:1; min-width:0; }
  .chk { display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:400; color:var(--ink-soft); cursor:pointer; }
  .chk input { accent-color:var(--brand); width:15px; height:15px; }

  .badge {
    display:inline-flex; align-items:center; font-size:11px; font-weight:700; color:#fff; padding:3px 10px;
    border-radius:999px; letter-spacing:.02em; text-transform:capitalize;
  }
  .initial-tag {
    display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:700; color:var(--brand-700);
    background:var(--brand-50); border:1px solid var(--brand-100); padding:4px 10px; border-radius:999px;
  }

  .subcard { border:1px solid var(--line); border-radius:11px; padding:12px; margin-bottom:10px; background:#fbfcfe; }
  .subcard .row { margin-bottom:8px; }
  .subcard .row:last-child { margin-bottom:0; }
  .smalllbl { font-size:11px; font-weight:650; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:4px; }
  .fnlist { border:1px solid var(--line); border-radius:11px; padding:10px 12px; background:#fbfcfe; }
  .fnlist .chk { padding:3px 0; }
  .note {
    font-size:12px; color:var(--ink-soft); background:var(--brand-50); border:1px solid var(--brand-100);
    border-radius:10px; padding:11px 12px; line-height:1.5;
  }
  .note code { background:#fff; border:1px solid var(--brand-100); border-radius:4px; padding:1px 5px; font-size:11.5px; }
  .note.plain { background:var(--line-soft); border-color:var(--line); }
  .section-sep { height:1px; background:var(--line); margin:20px 0; }

  /* ---- custom React Flow node ----
     The Worktree card: deliberately spare — a small category icon, the step's
     plain name, ONE line of what's said or asked, and a question count.
     Everything else lives in the panel a click away. */
  .rf-node {
    background:#fff; border:1px solid var(--line); border-top-width:3px; border-radius:11px;
    padding:9px 11px; width:212px; box-shadow:var(--shadow-sm);
    transition:box-shadow .12s;
  }
  .rf-node.ports { width:244px; padding-bottom:0; }
  .rf-node:hover { box-shadow:var(--shadow-md); }
  .rf-node.sel { box-shadow:0 0 0 3px var(--brand-100), var(--shadow-md); }
  .rf-node .nhead { display:flex; align-items:flex-start; gap:8px; }
  .rf-node .nicon {
    width:22px; height:22px; border-radius:7px; flex-shrink:0; margin-top:1px;
    display:flex; align-items:center; justify-content:center;
  }
  .rf-node .nmain { min-width:0; flex:1; }
  .rf-node .nid { font-weight:700; font-size:13px; color:var(--ink); letter-spacing:-.01em; line-height:1.35;
                  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
                  border-radius:6px; padding:0 3px; margin:0 -3px; cursor:text; }
  .rf-node .nid:hover { background:var(--line-soft); }
  .rf-node .nid-input {
    font:inherit; font-weight:700; font-size:13px; color:var(--ink); width:100%;
    border:1px solid var(--brand); border-radius:6px; padding:0 4px; margin:0 -3px;
    outline:none; box-shadow:0 0 0 3px var(--brand-50); background:#fff;
  }
  .rf-node .nline { font-size:11px; color:var(--muted); margin-top:2px; line-height:1.4;
                    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rf-node .nqcount {
    display:inline-flex; margin-top:6px; font-size:10.5px; font-weight:650; color:var(--ink-soft);
    background:var(--line-soft); border:1px solid var(--line); border-radius:6px; padding:0 7px;
  }
  .rf-node .ninit { display:inline-flex; align-items:center; color:var(--brand); flex-shrink:0; margin-top:2px; }
  /* outcome ports on decision cards: "Existing patient ○ · New patient ○" */
  .rf-node .nports { display:flex; margin:7px -6px 0; border-top:1px solid var(--line-soft); }
  .rf-node .nport { position:relative; flex:1; min-width:0; text-align:center; padding:4px 4px 10px; }
  .rf-node .nport + .nport { border-left:1px solid var(--line-soft); }
  .rf-node .nport .nport-lbl {
    display:block; font-size:9.5px; font-weight:650; color:var(--muted); line-height:1.3;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .rf-node .nport .react-flow__handle {
    position:absolute; bottom:-5px; left:50%; transform:translateX(-50%);
    width:9px; height:9px; background:#fff; border:2px solid var(--edge);
  }
  .react-flow__handle { width:9px; height:9px; background:var(--edge); border:2px solid #fff; }
  /* port-drag affordances: draggable ports glow on hover; fixed outcomes are
     plain dots with no affordance */
  .rf-node .react-flow__handle.pdrag { cursor:crosshair; }
  .rf-node .react-flow__handle.pdrag:hover {
    background:var(--brand); border-color:#fff;
    box-shadow:0 0 0 4px var(--brand-100);
  }
  .rf-node .nport .react-flow__handle.pdrag:hover { background:var(--brand-50); border-color:var(--brand); }
  .rf-node .react-flow__handle.pfix { cursor:default; }
  /* invisible catcher over a fixed linear port: grabbing it explains itself */
  .rf-node { position:relative; }
  .rf-node .pcatch {
    position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
    width:18px; height:17px; pointer-events:all; cursor:default;
  }
  .rf-node .nport.nodrag { cursor:default; }
  /* while a route is being dragged: card top edges become visible landing spots */
  .canvas.connecting .react-flow__handle-top {
    width:13px; height:13px; background:var(--brand-50); border-color:var(--brand);
  }
  .canvas.connecting .react-flow__node:hover .rf-node {
    box-shadow:0 0 0 3px var(--brand-100), var(--shadow-md);
  }
  .canvas.connecting .react-flow__node:hover .react-flow__handle-top,
  .react-flow__handle-connecting { background:var(--brand) !important; }
  .react-flow__connection-path { stroke:#5E78EE; stroke-width:2; }
  @keyframes edgeFadeOut { to { opacity:0; } }
  .react-flow__edge-path { stroke-width:1.7; }
  .react-flow__controls { box-shadow:var(--shadow-md); border-radius:10px; overflow:hidden; border:1px solid var(--line); }
  .react-flow__controls-button { border-bottom:1px solid var(--line-soft); }
  .react-flow__minimap { border-radius:10px; overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--line); }
  .react-flow__attribution { display:none; }

  /* ---- toast ---- */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    background:#fff; color:var(--ink); padding:12px 18px; border-radius:12px; font-size:13.5px; font-weight:600;
    box-shadow:var(--shadow-lg); z-index:100; max-width:80vw; border:1px solid var(--line);
    animation:toastIn .22s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes toastIn { from { opacity:0; transform:translate(-50%,12px); } to { opacity:1; transform:translate(-50%,0); } }
  .toast .toast-ic {
    width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:13px; font-weight:800; flex-shrink:0; background:var(--ok);
  }
  .toast.err .toast-ic { background:var(--err); }

  /* ---- modal ---- */
  .overlay {
    position:fixed; inset:0; background:rgba(28,35,51,.45); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:80; padding:24px;
    animation:fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal {
    background:var(--panel); border-radius:18px; box-shadow:var(--shadow-lg); width:100%; max-width:560px;
    max-height:85vh; display:flex; flex-direction:column; overflow:hidden;
    animation:modalIn .2s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes modalIn { from { opacity:0; transform:translateY(10px) scale(.98); } to { opacity:1; transform:none; } }
  .modal.sm { max-width:440px; }
  .modal-head { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 14px; }
  .modal-head h3 { margin:0; font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .modal-head .sub { font-size:13px; color:var(--muted); font-weight:400; margin-top:3px; }
  .modal-x {
    border:none; background:transparent; color:var(--muted); font-size:20px; line-height:1; padding:4px 8px;
    border-radius:8px; cursor:pointer;
  }
  .modal-x:hover { background:var(--line-soft); color:var(--ink); }
  .modal-body { padding:4px 24px 8px; overflow:auto; }
  .modal-foot { display:flex; justify-content:flex-end; gap:10px; padding:16px 24px 22px; }

  /* open-flow cards */
  .flow-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding-bottom:8px; }
  .flow-card {
    text-align:left; border:1px solid var(--line); border-radius:14px; padding:16px; background:#fff; cursor:pointer;
    transition:border-color .12s, box-shadow .12s, transform .1s; display:block;
  }
  .flow-card:hover { border-color:var(--brand); box-shadow:var(--shadow-md); transform:translateY(-1px); background:#fff; }
  .flow-card .fc-icon {
    width:36px; height:36px; border-radius:10px; background:var(--brand-50); color:var(--brand-700);
    display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:10px;
  }
  .flow-card .fc-title { font-size:14px; font-weight:700; color:var(--ink); margin-bottom:4px; line-height:1.35; }
  .flow-card .fc-file { font-size:12px; color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .flow-empty { text-align:center; color:var(--muted); padding:36px 12px; font-size:13.5px; }

  .prefix { display:flex; align-items:center; }
  .prefix input { border-radius:9px 0 0 9px; border-right:none; flex:1; }
  .prefix .suffix {
    padding:9px 12px; background:var(--line-soft); border:1px solid var(--line); border-left:none;
    border-radius:0 9px 9px 0; color:var(--muted); font-size:13px; font-weight:600;
  }
  a.navlink { color:var(--brand-700); font-size:13px; text-decoration:none; font-weight:650; padding:6px 8px; border-radius:8px; }
  a.navlink:hover { background:var(--brand-50); }

  /* icon alignment */
  svg.ic { display:block; }
  button svg.ic { flex-shrink:0; }
  .empty .big svg.ic { opacity:.55; }

  /* orphan / not-connected marker on a node card */
  .norphan {
    display:inline-flex; align-items:center; gap:4px; margin-top:6px;
    font-size:10.5px; font-weight:700; color:#c2620c;
  }
  .norphan svg.ic { color:#e08d2f; }

  /* warning note (unconnected step) */
  .note.warn { background:#fff7ed; border-color:#fed7aa; color:#9a3412; display:flex; gap:8px; align-items:flex-start; }
  .note.warn svg.ic { flex-shrink:0; margin-top:1px; }

  /* palette tip */
  .tip {
    display:flex; gap:8px; align-items:flex-start; font-size:11.5px; color:var(--ink-soft);
    background:var(--brand-50); border:1px solid var(--brand-100); border-radius:10px;
    padding:9px 10px; margin-bottom:14px; line-height:1.45;
  }
  .tip svg.ic { color:var(--brand); margin-top:1px; flex-shrink:0; }

  /* ---- insert / drop affordances on an edge midpoint ---- */
  /* resting z-index 0 keeps the layer above edges but below cards; during a
     drag it jumps above everything so the drop pill is always reachable */
  .edge-lyr {
    position:absolute; pointer-events:all; display:flex; flex-direction:column;
    align-items:center; gap:4px; z-index:0;
  }
  .edge-lyr.drop { z-index:20; }
  .edge-insert {
    display:inline-flex; align-items:center; gap:0; overflow:hidden;
    height:24px; padding:0 6px; border-radius:999px; cursor:pointer;
    background:var(--brand); border:2px solid #fff; color:#fff; font-weight:700; font-size:12px;
    box-shadow:0 2px 8px rgba(94,120,238,.45); transition:padding .12s, background .12s;
  }
  .edge-insert:hover { background:var(--brand-600); }
  .edge-insert .ei-plus { font-size:16px; line-height:1; }
  .edge-insert .ei-txt {
    max-width:0; opacity:0; overflow:hidden; white-space:nowrap; transition:max-width .16s, opacity .12s, margin .12s;
  }
  .edge-insert:hover .ei-txt { max-width:90px; opacity:1; margin-left:5px; }
  .dropzone {
    background:#fff; border:1.5px solid var(--brand); color:var(--brand-700);
    font-size:11px; font-weight:700; padding:4px 11px; border-radius:999px;
    box-shadow:var(--shadow-sm); white-space:nowrap;
  }
  .dropzone.over { background:var(--brand); color:#fff; box-shadow:0 2px 10px rgba(94,120,238,.5); }
  /* remove-this-arrow affordance on a selected edge */
  .edge-x {
    width:24px; height:24px; padding:0; justify-content:center; border-radius:50%;
    background:#fff; border:1.5px solid #fecaca; color:#b91c1c; font-size:12px; font-weight:800;
    box-shadow:var(--shadow-sm);
  }
  .edge-x:hover { background:#fee2e2; border-color:#fca5a5; }

  /* ---- "Advanced" collapsible in the properties panel ---- */
  .adv { border:1px solid var(--line); border-radius:11px; margin:18px 0 4px; overflow:hidden; }
  .adv-toggle {

<script type="module">
import React, { useState, useRef, useCallback, useEffect } from "react";
import { createRoot } from "react-dom/client";
import htm from "htm";
import ReactFlow, {
  Background, Controls, MiniMap, Handle, Position,

const html = htm.bind(React.createElement);

/* ---- inline SVG icons (no emoji → no tofu boxes on any platform) ---------- */
function Icon({ name, size }) {

    case "list":
      return html`<svg ...${a}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`;
    case "zap":
      return html`<svg ...${a}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
    case "user":
      return html`<svg ...${a}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    case "box": // component / package
      return html`<svg ...${a}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;

      return null;

}

/* ---- rename a node id, rewriting every routing reference to it ------------- */
// Rename is a user edit (never runs on an unedited load→save), so it may
// restructure freely — but it MUST keep routing intact by rewriting each place
// the old id is referenced: node.next / node.fallback / bucket.next and every
// function goto (plain, guard, route, and {cond,then,else}).
function rewriteGoto(goto, oldId, newId) {
  if (typeof goto === "string") return goto === oldId ? newId : goto;
  if (goto && typeof goto === "object" && "cond" in goto) {
    return { ...goto, then: rewriteGoto(goto.then, oldId, newId), else: rewriteGoto(goto.else, oldId, newId) };
  }
  return goto;
}
function rewriteRoutes(routes, oldId, newId) {
  (routes || []).forEach((r) => {
    if ("goto" in r) r.goto = rewriteGoto(r.goto, oldId, newId);
    rewriteRoutes(r.routes, oldId, newId);
  });
}
function renameNodeInFlow(flow, oldId, newId, posMap) {
  // preserve key order: rename the key in place
  flow.nodes = Object.fromEntries(
    Object.entries(flow.nodes).map(([k, v]) => [k === oldId ? newId : k, v])
  );
  if (flow.initial_node === oldId) flow.initial_node = newId;
  Object.values(flow.nodes).forEach((n) => {
    if (n.next === oldId) n.next = newId;
    if (n.fallback === oldId) n.fallback = newId;
    (n.buckets || []).forEach((b) => { if (b.next === oldId) b.next = newId; });
  });
  Object.values(flow.functions || {}).forEach((fd) => {
    const b = fd.behavior;
    if (!b) return;
    if ("goto" in b) b.goto = rewriteGoto(b.goto, oldId, newId);
    (b.guards || []).forEach((g) => { if ("goto" in g) g.goto = rewriteGoto(g.goto, oldId, newId); });
    rewriteRoutes(b.routes, oldId, newId);
  });
  if (posMap && posMap[oldId]) { posMap[newId] = posMap[oldId]; delete posMap[oldId]; }
}

/* ---- node type metadata ----------------------------------------------------
   Color communicates FUNCTION, not technical node type — four categories a
   non-technical reader can hold in their head:
     conversation (blue)  = the assistant talks / asks
     decision     (amber) = the call branches on what the caller says
     integration  (teal)  = the assistant performs an action / uses a tool
     terminal     (rose)  = the call ends or leaves the assistant            */
const CATEGORY = {
  say: "conversation", collect: "conversation", "collect-custom": "conversation",
  branch: "decision", categorize: "decision",
  tool: "integration",
  handoff: "terminal", end: "terminal",
};
const CAT_META = {
  conversation: { label: "Conversation", color: "var(--cat-conv)", bg: "var(--cat-conv-bg)" },
  decision:     { label: "Decision",     color: "var(--cat-dec)",  bg: "var(--cat-dec-bg)" },
  integration:  { label: "Action",       color: "var(--cat-int)",  bg: "var(--cat-int-bg)" },
  terminal:     { label: "Call ends",    color: "var(--cat-term)", bg: "var(--cat-term-bg)" },
};
// Human-readable label per visual type, shown in the panel badge.
const TYPE_LABEL = {
  say: "Say", collect: "Gather info", "collect-custom": "Ask questions",
  branch: "Decision", categorize: "Direct caller",
  tool: "Run action", handoff: "Hand to human", end: "End call",
};
const TYPE_ICON = {
  say: "chat", collect: "list", "collect-custom": "help",
  branch: "flow", categorize: "flow",
  tool: "zap", handoff: "user", end: "flag",
};
const NODE_TYPES = [
  { key: "say",            label: "Say something" },
  { key: "collect",        label: "Gather info (freeform)" },
  { key: "collect-custom", label: "Ask questions" },
  { key: "branch",         label: "Decision" },
  { key: "categorize",     label: "Direct caller" },
  { key: "tool",           label: "Run an action" },
  { key: "handoff",        label: "Hand to human" },
  { key: "end",            label: "End call" },
];
// Left-rail sections. All existing step types, grouped the way a flow reads:
// things said, places the call forks, ways it ends.
const RAIL = [
  { title: "Conversation", keys: ["say", "collect", "collect-custom", "tool"] },
  { title: "Decisions",    keys: ["branch", "categorize"] },
  { title: "Endings",      keys: ["handoff", "end"] },
];
// A collect node with a `fields` list is the clinic-defined custom-question variant.
function visualType(node) {
  if (node.type === "collect" && Array.isArray(node.fields)) return "collect-custom";
  return node.type || "say";
}
function catFor(vt) { return CAT_META[CATEGORY[vt] || "conversation"]; }
function colorFor(node) { return catFor(visualType(node)).color; }
// "verify_existing_patient" → "verify existing patient" for labels.
function humanize(s) { return String(s || "").replace(/_/g, " "); }
function prettyStep(id) {
  const s = humanize(id);
  return s.charAt(0).toUpperCase() + s.slice(1);
}
// One plain-words line for a decision card: instructions usually open with
// greeting/tone fluff and bury the actual decision mid-text — prefer the first
// sentence that asks something ("ask …", "whether …", or ends in "?"); fall
// back to the first sentence. Display only.
function decisionSummary(text) {
  const sentences = String(text || "").split(/(?<=[.?!])\s+/);
  let s = (sentences.find((x) => /\bask\b|\bwhether\b|\?/i.test(x)) || sentences[0] || "").trim();
  // drop a leading clause before the ask ("In the same breath, ask if…" → "Ask if…")
  const m = s.match(/\bask\b/i);
  if (m && m.index > 0) s = s.slice(m.index);
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* ---- edge derivation (a VIEW over the config; never mutates it) ------------ */
// Pull every node-id goto target out of a function behavior (handles guards,
// plain goto, nested routes, and {cond, then, else} conditionals).
function collectGoto(goto, acc) {
  if (!goto) return;
  if (typeof goto === "string") { acc.push(goto); return; }
  if (typeof goto === "object" && "cond" in goto) {
    collectGoto(goto.then, acc);
    collectGoto(goto.else, acc);
  }
}
function collectRoutes(routes, acc) {
  (routes || []).forEach((r) => { collectGoto(r.goto, acc); collectRoutes(r.routes, acc); });
}
function behaviorTargets(behavior) {
  const acc = [];
  if (!behavior) return acc;
  (behavior.guards || []).forEach((g) => collectGoto(g.goto, acc));
  collectGoto(behavior.goto, acc);
  collectRoutes(behavior.routes, acc);
  return acc;
}

// A function behavior is a "simple linear goto" only when it routes to exactly
// one node, unconditionally: a plain string `goto`, no guards, no conditional
// routes, no {cond,...}. Returns that target id, or null. These are the routes
// we can safely insert into by editing one value.
function simpleLinearGoto(behavior) {
  if (!behavior) return null;
  if (behavior.guards && behavior.guards.length) return null;
  if (behavior.routes) return null;
  return typeof behavior.goto === "string" ? behavior.goto : null;
}

// The plain-slot SHAPE: an unconditional single goto — a string target, or
// null (the engine's own "no target" value, e.g. after an arrow is removed).
// Returns the goto value, or undefined when the behavior is conditional
// (guards / routes / {cond,...}) and therefore never a draggable slot.
function plainGoto(behavior) {
  if (!behavior) return undefined;
  if (behavior.guards && behavior.guards.length) return undefined;
  if (behavior.routes) return undefined;
  if (!("goto" in behavior)) return undefined;
  const g = behavior.goto;
  return typeof g === "string" || g === null ? g : undefined;
}

/* ---- every route pointing AT a node (used so delete can reverse insert) ----
   Returns one entry per inbound reference. Entries of a rewireable kind — a
   node-level `next`, a bucket `next`, or a plain-string function
   `behavior.goto` (the exact three routes insert-step writes) — carry a
   `rewire(target)` that repoints them. Anything conditional (guard gotos,
   nested routes, {cond,then,else}, categorize fallback) is `complex: true`:
   we never rewrite those on delete. */
function inboundRoutes(flow, nodeId) {
  const inbound = [];
  Object.entries(flow.nodes || {}).forEach(([nid, n]) => {
    if (nid === nodeId) return; // the node's own routing points OUT, not in
    if (n.next === nodeId) inbound.push({ rewire: (t) => { n.next = t; } });
    (n.buckets || []).forEach((b) => {
      if (b.next === nodeId) inbound.push({ rewire: (t) => { b.next = t; } });
    });
    if (n.fallback === nodeId) inbound.push({ complex: true });
  });
  Object.values(flow.functions || {}).forEach((fd) => {
    const b = fd.behavior;
    if (!b) return;
    if (typeof b.goto === "string") {
      if (b.goto === nodeId) inbound.push({ rewire: (t) => { b.goto = t; } });
    } else {
      const acc = [];
      collectGoto(b.goto, acc); // {cond,then,else} targets
      acc.forEach((t) => { if (t === nodeId) inbound.push({ complex: true }); });
    }
    const acc = [];
    (b.guards || []).forEach((g) => collectGoto(g.goto, acc));
    collectRoutes(b.routes, acc);
    acc.forEach((t) => { if (t === nodeId) inbound.push({ complex: true }); });
  });
  return inbound;
}

/* ---- edges: ONE quiet style for every connection ---------------------------
   Whether a step continues via its own `next`, a categorize bucket, or a
   function goto, the map draws the same plain arrow — how a route is
   implemented is not the reader's problem. The mechanics still ride along in
   `data.via` (how to rewire on insert): edges without `via` cannot accept an
   insert with the existing primitives. Decision-card edges anchor to that
   card's labeled outcome port via `sourceHandle`. */
const EDGE_COLOR = "#aab2c8";
function computeEdges(flow) {
  const nodeIds = new Set(Object.keys(flow.nodes || {}));
  // How many nodes expose each function — only single-use functions are safe to
  // rewire (editing a shared function's goto would reroute every node using it).
  const fnUsage = {};
  Object.values(flow.nodes || {}).forEach((n) =>
    (n.functions || []).forEach((fn) => { fnUsage[fn] = (fnUsage[fn] || 0) + 1; }));

  const edges = [];
  const seen = new Set();
  // opts.slotRef: the single plain routing value this arrow draws (a next, a
  // bucket next, or a plain-string goto) — the arrow can be re-pointed or
  // removed through it. Arrows without one carry a blockedMsg instead.
  const add = (source, target, key, opts = {}) => {
    if (!target || !nodeIds.has(target)) return;
    const id = `${source}=>${target}#${key}`;
    if (seen.has(id)) return;
    seen.add(id);
    edges.push({
      id, source, target,
      ...(opts.sourceHandle ? { sourceHandle: opts.sourceHandle } : {}),
      type: "flowEdge",
      style: { stroke: EDGE_COLOR, strokeWidth: 1.7 },
      markerEnd: { type: "arrowclosed", color: EDGE_COLOR, width: 15, height: 15 },
      data: {
        source, target, via: opts.via || null,
        slotRef: opts.slotRef || null,
        blockedMsg: opts.blockedMsg || MSG_COMPLEX_PORT,
      },
    });
  };

  for (const [id, node] of Object.entries(flow.nodes || {})) {
    const vt = visualType(node);
    const isDecision = CATEGORY[vt] === "decision";
    if (node.type === "categorize") {
      // Each bucket target is a node-owned linear route → insertable.
      (node.buckets || []).forEach((b, i) =>
        add(id, b.next, `b${i}`, {
          via: { type: "bucket", index: i }, sourceHandle: `b:${i}`,
          slotRef: { type: "bucket", node: id, index: i },
        }));
      // Fallback is a default route — drawn like everything else, not insertable.
      add(id, node.fallback, "fb", { sourceHandle: "fb", blockedMsg: MSG_FALLBACK_PORT });
    } else if (vt === "collect-custom") {
      add(id, node.next, "next", { via: { type: "next" }, slotRef: { type: "next", node: id } });
    }
    // Routing implied by exposed functions — same quiet arrow as everything else.
    (node.functions || []).forEach((fn) => {
      const def = (flow.functions || {})[fn];
      if (!def) return;
      const sh = isDecision ? `f:${fn}` : undefined;
      const linear = simpleLinearGoto(def.behavior);
      const slotRef = plainGoto(def.behavior) !== undefined ? { type: "goto", fn } : null;
      if (linear && fnUsage[fn] === 1) {
        // Single unconditional target, used only here → insertable by editing
        // this one goto value.
        add(id, linear, fn, { via: { type: "goto", fn }, sourceHandle: sh, slotRef });
      } else {
        // Conditional / multi-target / shared → drawn, but not insertable.
        // (A shared plain goto still carries its slotRef: like port-drag, a
        // removal edits that ONE value — the map shows every arrow riding it.)
        behaviorTargets(def.behavior).forEach((t) => add(id, t, fn, { sourceHandle: sh, slotRef }));
      }
    });
  }
  return edges;
}

/* ---- routing slots: the ONE mutation this pass adds -------------------------
   A slot is a single re-pointable routing value: a node's own `next`, a
   categorize bucket's `next`, or a PLAIN-STRING function behavior.goto.
   Conditional gotos ({cond,then,else}), guards, route arrays, and fallbacks
   are never slots — they can't be re-pointed by dragging, ever.
   repointRoute changes that one value and nothing else. */
function repointRoute(flow, slot, targetId) {
  if (slot.type === "next") flow.nodes[slot.node].next = targetId;
  else if (slot.type === "bucket") flow.nodes[slot.node].buckets[slot.index].next = targetId;
  else if (slot.type === "goto") flow.functions[slot.fn].behavior.goto = targetId;
}
// What the slot currently points at (null when empty — a parked card's open port).
function slotTarget(flow, slot) {
  if (!slot) return null;
  if (slot.type === "next") return flow.nodes[slot.node].next || null;
  if (slot.type === "bucket") return (flow.nodes[slot.node].buckets[slot.index] || {}).next || null;
  if (slot.type === "goto") {
    const g = (flow.functions[slot.fn] || {}).behavior?.goto;
    return typeof g === "string" && g ? g : null;
  }
  return null;
}

// Honest messages for ports that can't be dragged. Plain words only.
const MSG_COMPLEX_PORT = "Where this goes depends on how the call goes — it can't be re-pointed by dragging.";
const MSG_FALLBACK_PORT = "This is the backup path — change it under “If nothing matches” in the step's panel.";
const MSG_NO_PATH = "This step won't continue the call by itself — follow it with an “Ask questions” step, or give it an action that moves the call onward.";

// The linear card's single bottom port maps to a slot only when the card has
// exactly ONE unconditional way out: its own `next` (custom-question steps),
// or its sole plain-goto action (say/collect steps route onward through their
// actions — that's how the clinic flow's say-steps continue). An action whose
// goto is still null counts too, so a removed arrow can be re-drawn. Cards
// with several ways out, or conditional ones, keep the honest message.
function linearSlot(flow, id) {
  const node = (flow.nodes || {})[id];
  if (!node) return null;
  const vt = visualType(node);
  if (CATEGORY[vt] === "decision" || CATEGORY[vt] === "terminal") return null;
  if (vt === "collect-custom") return { type: "next", node: id };
  const routed = (node.functions || []).filter((fn) => {
    const def = (flow.functions || {})[fn];
    return def && behaviorTargets(def.behavior).length > 0;
  });
  if (routed.length > 1) return null;
  if (routed.length === 1) {
    return plainGoto((flow.functions[routed[0]] || {}).behavior) !== undefined
      ? { type: "goto", fn: routed[0] } : null;
  }
  // No routed actions: exactly one action with an EMPTY plain goto still gives
  // this card a draggable (empty) port — how a say-step gets its first route.
  const empties = (node.functions || []).filter((fn) => {
    const def = (flow.functions || {})[fn];
    return def && plainGoto(def.behavior) === null;
  });
  return empties.length === 1 ? { type: "goto", fn: empties[0] } : null;
}

/* ---- outcome ports for decision cards ---------------------------------------
   One labeled port per way the call can leave the card: each categorize bucket,
   its "otherwise" default, and each behavior-routed outcome. Port ids MUST
   match the sourceHandle ids computeEdges assigns, or React Flow drops the
   edge. A port carries its slot when it is re-pointable by dragging; ports
   without a slot render as plain dots and explain themselves when grabbed. */
function decisionPorts(flow, id) {
  const node = (flow.nodes || {})[id];
  if (!node || CATEGORY[visualType(node)] !== "decision") return null;
  const ports = [];
  (node.buckets || []).forEach((b, i) => ports.push({
    id: `b:${i}`, label: prettyStep(b.name || "option"),
    slot: { type: "bucket", node: id, index: i },
  }));
  if (node.type === "categorize") ports.push({ id: "fb", label: "Otherwise", slot: null, blockedMsg: MSG_FALLBACK_PORT });
  (node.functions || []).forEach((fn) => {
    const def = (flow.functions || {})[fn];
    if (!def) return;
    const plain = plainGoto(def.behavior);
    // A port exists for every outcome with a target, plus plain-goto outcomes
    // whose target was removed (goto null) — those stay draggable to re-wire.
    if (behaviorTargets(def.behavior).length || plain !== undefined) ports.push({
      id: `f:${fn}`, label: prettyStep(fn),
      slot: plain !== undefined ? { type: "goto", fn } : null,
      blockedMsg: MSG_COMPLEX_PORT,
    });
  });
  return ports;
}

// Resolve a drag's source handle to its slot (always from the LIVE flow, so a
// stale canvas can never repoint something that's no longer plain).
function portSlot(flow, nodeId, handleId) {
  if (!handleId) return linearSlot(flow, nodeId);
  const p = (decisionPorts(flow, nodeId) || []).find((x) => x.id === handleId);
  return p ? p.slot : null;
}

/* ---- is this seam ambiguous? -------------------------------------------------
   Mechanically every `via` seam inserts the same safe way (repoint one value,
   point the new step's `next` at the old target). But some positions can
   surprise the reader — the seam feeds the call's very first step, sits on one
   branch of a decision, or targets a step several paths converge on. Those get
   a one-line confirm; everything else inserts silently. Returns the confirm
   message, or null. */
function insertConcern(flow, edgeInfo) {
  const { source, target, via } = edgeInfo || {};
  if (target && target === flow.initial_node)
    return `“${prettyStep(target)}” is where every call starts — the new step will be heard just before it, on this path only.`;
  const src = flow.nodes ? flow.nodes[source] : null;
  if (src && CATEGORY[visualType(src)] === "decision") {
    let label = "";
    if (via && via.type === "bucket") label = humanize((src.buckets && src.buckets[via.index] || {}).name || "option");
    else if (via && via.fn) label = humanize(via.fn);
    return `This spot is on the “${label}” path out of “${prettyStep(source)}” — callers only hear the new step when the call goes that way.`;
  }
  if (target && inboundRoutes(flow, target).length > 1)
    return `Several paths lead to “${prettyStep(target)}” — the new step will sit on this one only.`;
  return null;
}

/* ---- auto layout (editor-only; positions are NOT written to the flow) ------
   Layered top-to-bottom layout: BFS assigns a depth level from the initial
   node, then a few barycenter sweeps order each row to minimise edge crossings.
   Rows are centred so the tree reads cleanly downward (handles are top/bottom). */
const H_GAP = 300, V_GAP = 185, PAD = 50; // compact cards → the whole flow fits one screen
function layout(flow) {
  const ids = Object.keys(flow.nodes || {});
  if (!ids.length) return {};
  const edges = computeEdges(flow);
  const adj = {}; ids.forEach((i) => (adj[i] = []));
  edges.forEach((e) => { if (adj[e.source]) adj[e.source].push(e.target); });

  // BFS depth from the initial node (fallback: first node)
  const level = {};
  const start = flow.initial_node && flow.nodes[flow.initial_node] ? flow.initial_node : ids[0];
  const queue = [start]; level[start] = 0;
  while (queue.length) {
    const cur = queue.shift();
    for (const nxt of adj[cur] || []) {
      if (level[nxt] === undefined) { level[nxt] = level[cur] + 1; queue.push(nxt); }
    }
  }
  // Unreached nodes (orphans) get their own row beneath everything else.
  let maxLvl = 0;
  ids.forEach((i) => { if (level[i] !== undefined) maxLvl = Math.max(maxLvl, level[i]); });
  ids.forEach((i) => { if (level[i] === undefined) level[i] = maxLvl + 1; });

  // group by level, preserving insertion order as the initial ordering
  const byLevel = {};
  ids.forEach((i) => { (byLevel[level[i]] = byLevel[level[i]] || []).push(i); });
  const levels = Object.keys(byLevel).map(Number).sort((a, b) => a - b);

  // parents for barycenter (only edges that go "down" a level)
  const parents = {}; ids.forEach((i) => (parents[i] = []));
  edges.forEach((e) => {
    if (parents[e.target] && level[e.source] < level[e.target]) parents[e.target].push(e.source);
  });

  const order = {};
  levels.forEach((l) => byLevel[l].forEach((id, idx) => { order[id] = idx; }));
  for (let sweep = 0; sweep < 4; sweep++) {
    levels.forEach((l) => {
      if (l === levels[0]) return;
      const bc = {};
      byLevel[l].forEach((id) => {
        const ps = parents[id];
        bc[id] = ps.length ? ps.reduce((a, p) => a + order[p], 0) / ps.length : order[id];
      });
      byLevel[l].sort((x, y) => (bc[x] - bc[y]) || (order[x] - order[y]));
      byLevel[l].forEach((id, idx) => { order[id] = idx; });
    });
  }

  const maxWidth = Math.max(...levels.map((l) => byLevel[l].length));
  const pos = {};
  levels.forEach((l) => {
    const row = byLevel[l];
    const n = row.length;
    row.forEach((id, idx) => {
      const x = (idx - (n - 1) / 2) * H_GAP + (maxWidth * H_GAP) / 2 + PAD;
      pos[id] = { x, y: l * V_GAP + PAD };
    });
  });
  return pos;
}

/* ---- custom React Flow node -------------------------------------------------
   Compact Worktree card: icon + plain title + one line of what's said/asked +
   question count. Decision cards additionally show their outcomes as labeled
   ports along the bottom edge. All content is READ from the existing config —
   nothing here writes to it. Double-click the title to rename in place
   (delegates to the same rename logic the panel uses). */
function cardLine(node) {
  const vt = visualType(node);
  if (vt === "collect-custom") {
    const qs = (node.fields || []).map((f) => f.question).filter(Boolean);
    return qs[0] || node.prompt || "";
  }
  if (node.type === "categorize") return node.prompt || "";
  if (CATEGORY[vt] === "decision") return decisionSummary(node.instructions || node.prompt);
  return (String(node.instructions || node.prompt || "").split(/(?<=[.?!])\s+/)[0] || "").trim();
}

function FlowNode({ id, data }) {
  const node = data.node;
  const vt = visualType(node);
  const cat = catFor(vt);
  const ports = data.ports;

  // -- inline rename (double-click the title) --
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(id);
  const startEdit = (e) => { e.stopPropagation(); setDraft(id); setEditing(true); };
  const commit = () => {
    setEditing(false);
    const nid = draft.trim();
    if (nid && nid !== id && data.onRename) data.onRename(id, nid);
  };

  const line = cardLine(node);
  const qCount = vt === "collect-custom"
    ? (node.fields || []).filter((f) => f.question || f.field).length : 0;

  // Bottom of the card: labeled outcome ports (decision), a single next port
  // (linear — draggable when it maps to a slot, incl. an EMPTY one on a parked
  // card), or nothing at all (ending cards have no way out).
  // Grabbing a fixed port explains itself in plain words. Non-connectable
  // handles are pointer-events:none (React Flow), so the message handler
  // lives on our own elements: the port cell, or a catcher over the dot.
  const blockedDown = (msg) => () => { data.onPortBlocked && data.onPortBlocked(msg); };
  let bottom = null;
  if (ports && ports.length) {
    bottom = html`<div class="nports">
      ${ports.map((p) => html`
        <div class=${"nport" + (p.slot ? "" : " nodrag")} key=${p.id}
          onPointerDown=${p.slot ? undefined : blockedDown(p.blockedMsg || MSG_COMPLEX_PORT)}>
          <span class="nport-lbl" title=${p.label}>${p.label}</span>
          <${Handle} type="source" position=${Position.Bottom} id=${p.id}
            isConnectable=${!!p.slot}
            className=${p.slot ? "pdrag" : "pfix"} />
          ${!p.slot && html`<span class="pcatch"></span>`}
        </div>`)}
    </div>`;
  } else if (CATEGORY[vt] !== "terminal" || data.hasOut) {
    bottom = data.linearSlot
      ? html`<${Handle} type="source" position=${Position.Bottom} isConnectable=${true} className="pdrag" />`
      : html`<${Handle} type="source" position=${Position.Bottom} isConnectable=${false} className="pfix" />
             <span class="pcatch nodrag" onPointerDown=${blockedDown(data.linearBlockedMsg || MSG_COMPLEX_PORT)}></span>`;
  }

  return html`
    <div class=${"rf-node" + (data.selected ? " sel" : "") + (ports && ports.length ? " ports" : "")}
         style=${{ borderTopColor: cat.color }}>
      <${Handle} type="target" position=${Position.Top} isConnectableStart=${false} />
      <div class="nhead">
        <span class="nicon" style=${{ background: cat.bg, color: cat.color }}><${Icon} name=${TYPE_ICON[vt] || "chat"} size=${13} /></span>
        <div class="nmain">
          ${editing
            ? html`<input class="nid-input nodrag" autoFocus value=${draft}
                     onInput=${(e) => setDraft(e.target.value)}
                     onBlur=${commit}
                     onKeyDown=${(e) => {
                       if (e.key === "Enter") e.target.blur();
                       else if (e.key === "Escape") { setDraft(id); setEditing(false); }
                     }}
                     onClick=${(e) => e.stopPropagation()} />`
            : html`<div class="nid" title="Double-click to rename" onDoubleClick=${startEdit}>${prettyStep(id)}</div>`}
          ${line && html`<div class="nline">${line}</div>`}
          ${qCount > 0 && html`<span class="nqcount">${qCount} question${qCount > 1 ? "s" : ""}</span>`}
          ${data.orphan && html`<div class="norphan"><${Icon} name="warn" size=${12} /> not connected</div>`}
        </div>
        ${data.isInitial && html`<span class="ninit" title="Start of the call"><${Icon} name="flag" size=${13} /></span>`}
      </div>
      ${bottom}
    </div>`;
}
const nodeTypes = { flowNode: FlowNode };

/* ---- custom edge: one quiet arrow + insert / drop affordances ---------------
   Every connection looks identical at rest. Hovering a seam that can take an
   insert reveals the "+" pill; while a palette/component item is being dragged,
   those seams show a drop pill instead and light up under the drag. Seams
   without `via` show nothing — the lines look uniform, the safety rules still
   apply. */
function FlowEdge({ id, sourceX, sourceY, targetX, targetY, sourcePosition, targetPosition, style, markerEnd, data }) {
  const [edgePath, labelX, labelY] = getSmoothStepPath({
    sourceX, sourceY, sourcePosition, targetX, targetY, targetPosition,
  });
  const d = data || {};
  const [hover, setHover] = useState(false);
  const [over, setOver] = useState(false); // a dragged item is over this seam
  // the RELEASE RULE's ghost: the route a port-drag just let go of, fading out
  if (d.fading) {
    return html`<${BaseEdge} id=${id} path=${edgePath} markerEnd=${markerEnd}
      style=${{ ...style, animation: "edgeFadeOut .5s ease forwards", pointerEvents: "none" }} />`;
  }
  const canInsert = !!d.via;
  const dropTarget = !!d.dropActive && canInsert;
  const stroke = over ? { stroke: "var(--brand)", strokeWidth: 2.4 }
    : d.isSel ? { stroke: "#4a62d8", strokeWidth: 2.4 }
    : d.emph ? { stroke: "#5E78EE", strokeWidth: 2 }
    : hover ? { stroke: "#7c86a3", strokeWidth: 2 } : {};
  const dragProps = dropTarget ? {
    onDragOver: (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; setOver(true); },
    onDragLeave: () => setOver(false),
    onDrop: (e) => {
      e.preventDefault(); e.stopPropagation(); setOver(false);
      if (d.onDropInsert) d.onDropInsert(d.edgeInfo);
    },
  } : {};
  return html`
    <${BaseEdge} id=${id} path=${edgePath} markerEnd=${markerEnd}
      style=${{ ...style, ...stroke, transition: "stroke .12s, stroke-width .12s" }} />
    <path d=${edgePath} fill="none" stroke="transparent" strokeWidth=${18}
      style=${{ pointerEvents: "stroke", cursor: "pointer" }}
      onMouseEnter=${() => setHover(true)} onMouseLeave=${() => setHover(false)} ...${dragProps} />
    ${(dropTarget || d.isSel || (canInsert && hover)) && html`
      <${EdgeLabelRenderer}>
        <div class=${"edge-lyr" + (dropTarget ? " drop" : "")}
          style=${{ transform: `translate(-50%,-50%) translate(${labelX}px,${labelY}px)` }}
          onMouseEnter=${() => setHover(true)} onMouseLeave=${() => setHover(false)} ...${dragProps}>
          ${dropTarget
            ? html`<div class=${"dropzone" + (over ? " over" : "")}>${over ? "drops in — wires itself" : "drop here"}</div>`
            : d.isSel
            ? html`<button class="edge-x" title="Remove this connection"
                onClick=${(e) => { e.stopPropagation(); d.onDeleteRoute && d.onDeleteRoute(id); }}>✕</button>`
            : html`<button class="edge-insert" title="Add a step here"
                onClick=${(e) => { e.stopPropagation(); d.onInsert && d.onInsert(d.edgeInfo); }}>
                <span class="ei-plus">+</span><span class="ei-txt">Add a step</span>
              </button>`}
        </div>
      <//>`}`;
}
const edgeTypes = { flowEdge: FlowEdge };

/* ---- read-only Outline view -------------------------------------------------
   Renders the CURRENT flow as an indented call script, derived fresh from the
   config on every render — no separate state, nothing to sync, and it never
   writes. The only interaction is clicking a step, which selects it (opens the
   panel and highlights it when you switch back to the map). */

// Visit order: walk from the first step along primary routing first (bucket
// nexts, a step's own next, simple linear action gotos), then any remaining
// branch targets — so the numbered list reads like the call's happy path.
function outlineOrder(flow) {
  const seen = new Set();
  const order = [];
  const start = flow.initial_node && flow.nodes[flow.initial_node]
    ? flow.initial_node : Object.keys(flow.nodes || {})[0];
  const visit = (id) => {
    if (!id || seen.has(id) || !flow.nodes[id]) return;
    seen.add(id);
    order.push(id);
    const n = flow.nodes[id];
    const primary = [];
    const rest = [];
    (n.buckets || []).forEach((b) => primary.push(b.next));
    if (typeof n.next === "string" && n.next) primary.push(n.next);
    (n.functions || []).forEach((fn) => {
      const def = (flow.functions || {})[fn];
      if (!def) return;
      const lin = simpleLinearGoto(def.behavior);
      if (lin) primary.push(lin);
      else rest.push(...behaviorTargets(def.behavior));
    });
    if (n.fallback) rest.push(n.fallback);
    [...primary, ...rest].forEach(visit);
  };
  if (start) visit(start);
  const orphans = Object.keys(flow.nodes || {}).filter((i) => !seen.has(i));
  return { order, orphans };
}

// One readable line per step: what it says (first sentence, quoted) or what it
// collects (its saved answer keys).
function outlineDesc(node) {
  const vt = visualType(node);
  if (vt === "collect-custom") {
    const keys = (node.fields || []).map((f) => humanize(f.field) || f.question).filter(Boolean);
    return keys.length ? "collects " + keys.join(", ") : "";
  }
  let s = CATEGORY[vt] === "decision"
    ? decisionSummary(node.instructions || node.prompt)
    : (String(node.instructions || node.prompt || "").split(/(?<=[.?!])\s+/)[0] || "").trim();
  if (!s) return "";
  if (s.length > 90) s = s.slice(0, 90).trimEnd() + "…";
  return "“" + s + "”";
}

function Outline({ flow, selected, onPick }) {
  const { order, orphans } = outlineOrder(flow);
  const isTerminal = (id) => CATEGORY[visualType(flow.nodes[id])] === "terminal";
  const main = order.filter((id) => !isTerminal(id));
  const endings = order.filter(isTerminal);
  // Choice lines appear only under decision steps — where the call branches.
  const choicesFor = (id) => {
    const n = flow.nodes[id];
    if (CATEGORY[visualType(n)] !== "decision") return [];
    const rows = [];
    (n.buckets || []).forEach((b) => {
      if (b.next && flow.nodes[b.next]) rows.push({ label: humanize(b.name || "option"), targets: [b.next] });
    });
    (n.functions || []).forEach((fn) => {
      const def = (flow.functions || {})[fn];
      if (!def) return;
      const ts = [...new Set(behaviorTargets(def.behavior))].filter((t) => flow.nodes[t]);
      if (ts.length) rows.push({ label: humanize(fn), targets: ts });
    });
    if (n.fallback && flow.nodes[n.fallback]) rows.push({ label: "if nothing matches", targets: [n.fallback] });
    return rows;
  };
  const chip = (id, warn) => html`
    <button key=${id} class=${"o-end" + (selected === id ? " sel" : "")} onClick=${() => onPick(id)}>
      <span class="o-dot" style=${{ background: warn ? "#e08d2f" : catFor(visualType(flow.nodes[id])).color }}></span>
      ${prettyStep(id)}
    </button>`;
  return html`
    <div class="outline-wrap">
      <div class="outline">
        <h2>Call flow</h2>
        <div class="o-sub">${flow.name ? flow.name + " — " : ""}the call in order, at a glance. Click a step to open it.</div>
        ${main.map((id, i) => {
          const node = flow.nodes[id];
          const cat = catFor(visualType(node));
          const desc = outlineDesc(node);
          const rows = choicesFor(id);
          return html`
            <div key=${id}>
              <div class=${"o-step" + (selected === id ? " sel" : "")} onClick=${() => onPick(id)}>
                <span class="o-num">${i + 1}.</span>
                <span class="o-dot" style=${{ background: cat.color }}></span>
                <span class="o-name">${prettyStep(id)}</span>
                ${desc && html`<span class="o-desc">— ${desc}</span>`}
              </div>
              ${rows.length > 0 && html`
                <div class="o-choices">
                  ${rows.map((r, j) => html`
                    <div class="o-choice" key=${j}>
                      <span class="o-lbl">${r.label}</span>
                      <span class="o-arrow">→</span>
                      ${r.targets.map((t, k) => html`
                        <span key=${t}>
                          ${k > 0 && html`<span class="o-arrow"> · </span>`}
                          <button class="o-link" onClick=${() => onPick(t)}>${prettyStep(t)}</button>
                        </span>`)}
                    </div>`)}
                </div>`}
            </div>`;
        })}
        ${endings.length > 0 && html`
          <div class="o-sec">Endings</div>
          <div class="o-endchips">${endings.map((id) => chip(id, false))}</div>`}
        ${orphans.length > 0 && html`
          <div class="o-sec">Not connected</div>
          <div class="o-endchips">${orphans.map((id) => chip(id, true))}</div>`}
      </div>
    </div>`;
}

/* ---- blank flow scaffold for CREATE --------------------------------------- */
const DEFAULT_PERSONA =
  "You are {ASSISTANT_NAME}, a warm, efficient front-desk scheduling assistant for {CLINIC_NAME}. " +
  "You are on a phone call. Speak naturally and keep every reply to one or two short sentences. " +
  "Never speak stage directions, asides, or descriptions of your own actions. Only speak words meant for the caller to hear.";

function blankFlow() {
  return {
    name: "Untitled flow",
    initial_node: "greeting",
    persona: DEFAULT_PERSONA,
    functions: {},
    nodes: {
      greeting: {
        type: "say",
        context: "reset",
        instructions: "Warmly greet the caller and introduce yourself.",
        functions: [],
      },
    },
  };
}

// Minimal, engine-valid skeletons for palette-added nodes.
function newNodeSkeleton(vtype) {
  switch (vtype) {
    case "collect-custom":
      // NOTE: no `prompt` — the engine has a sensible default intro. Writing the
      // question into BOTH prompt and fields[].question made the assistant ask
      // it twice on a call; the question lives in ONE place (fields[].question).
      // An optional custom intro can still be set under Advanced in the panel.
      return {
        type: "collect",
        fields: [{ question: "", field: "", required: false }],
        next: "",
        functions: [],
      };
    case "categorize":
      return { type: "categorize", prompt: "How can I help you today?", buckets: [], fallback: "" };
    case "handoff":
    case "end":
      return { type: vtype, instructions: "", functions: [] };
    default: // say, collect (fixed), branch, tool
      return { type: vtype, instructions: "", functions: [] };
  }
}

// A saved component instantiates as a normal custom-question step — the exact
// same shape the palette's "Ask questions" produces, with the saved questions
// already filled in. Deep-copied so edits never touch the library copy.
function componentSkeleton(payload) {
  return {
    type: "collect",
    fields: JSON.parse(JSON.stringify(payload.fields || [])),
    next: "",
    functions: [],
  };
}

// The stem we use as a default id when a node is dropped from the palette.
function baseIdFor(vtype) {
  return vtype === "collect-custom" ? "collect" : vtype;
}
// Clean, readable default ids: collect_1, say_1, … (the user renames these to
// something meaningful, e.g. ask_pharmacy, via the Step name field).
function uniqueId(flow, base) {
  let i = 1;
  while (flow.nodes[`${base}_${i}`]) i++;
  return `${base}_${i}`;
}

// Accept a plain key ("pharmacy"); if the user pastes state["pharmacy"],
// state['pharmacy'], state.pharmacy, or ["pharmacy"], reduce it to the bare key.
function normalizeFieldKey(raw) {
  if (!raw) return raw;
  let s = String(raw).trim();
  let m =
    s.match(/^state\s*\[\s*['"]?([A-Za-z0-9_]+)['"]?\s*\]$/) ||
    s.match(/^state\s*\.\s*([A-Za-z0-9_]+)$/) ||
    s.match(/^\[\s*['"]?([A-Za-z0-9_]+)['"]?\s*\]$/) ||
    s.match(/^['"]([A-Za-z0-9_]+)['"]$/);
  return m ? m[1] : s;
}

// Suggest a storage key from a question: "Which pharmacy do you use?" → "pharmacy".
const SLUG_STOP = new Set([
  "which", "what", "whats", "who", "when", "where", "how", "do", "does", "did",
  "you", "your", "the", "a", "an", "is", "are", "was", "of", "to", "for", "use",
  "please", "me", "tell", "have", "has", "any", "their", "there", "they", "we", "i",
]);
function suggestFieldKey(question) {
  const words = String(question || "").toLowerCase()
    .replace(/[^a-z0-9]+/g, " ").trim().split(/\s+/)
    .filter((w) => w.length > 1 && !SLUG_STOP.has(w)); // >1 drops the stray "s" of "what's"
  return words.slice(0, 3).join("_");
}

// "Insurance details" → "insurance_details" (safe for file names AND step ids).
function slugify(s) {
  return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
}

// Only these payloads can be wired into a seam with the existing insert
// primitive (both produce a step that carries its own `next`).
function payloadInsertable(p) {
  return !!p && (p.kind === "component" || p.vtype === "collect-custom");
}

/* ========================================================================== */
function App() {
  // The parsed flow config is the single source of truth. We mutate it in place
  // and re-render via `rev`; export = this object stringified, so an unedited
  // load→export is byte-identical in structure (round-trip safe).
  const flowRef = useRef(null);
  const posRef = useRef({});         // editor-only node positions (never saved)
  const [rev, setRev] = useState(0);
  const bump = useCallback(() => setRev((r) => r + 1), []);

  const [rfNodes, setRfNodes] = useState([]);
  const [rfEdges, setRfEdges] = useState([]);
  const [selected, setSelected] = useState(null);
  const [selectedEdge, setSelectedEdge] = useState(null); // id of the selected arrow
  const edgesRef = useRef([]); // current derived edges (for arrow-delete lookup)
  const [showFlowSettings, setShowFlowSettings] = useState(false);
  const [view, setView] = useState("map"); // "map" (default) | "outline" (read-only)

  const [flowList, setFlowList] = useState([]);
  const [components, setComponents] = useState([]);
  const [loadedName, setLoadedName] = useState("");   // file stem currently loaded/saved
  const [dirty, setDirty] = useState(false);          // unsaved changes since last load/save
  const [viewKey, setViewKey] = useState(0);          // bump to remount React Flow → fresh fitView
  const [toast, setToast] = useState(null);

  // modal state: only one open at a time
  const [showOpen, setShowOpen] = useState(false);
  const [savePrompt, setSavePrompt] = useState(null); // {initial, copy} | null
  const [showNewComponent, setShowNewComponent] = useState(false);
  const [confirmBox, setConfirmBox] = useState(null); // {title, message, confirmLabel, tone?, onConfirm}

  // drag-from-palette: the payload rides in a ref (dataTransfer is unreadable
  // during dragover); dragInsert re-renders edges so insertable seams show
  // their drop pills while the drag is live.
  const dragPayloadRef = useRef(null);
  const [dragInsert, setDragInsert] = useState(false);
  const rfInst = useRef(null);
  const canvasRef = useRef(null);

  // port-drag routing: while a route is being dragged off a port, cards light
  // up as landing spots; the old arrow fades out on release (fadeEdges).
  const [connecting, setConnecting] = useState(false);
  const connStart = useRef(null);   // {nodeId, handleId, handleType} of the grabbed port
  const didConnect = useRef(false); // onConnect fired → onConnectEnd must not double-handle
  const fadeEdges = useRef([]);     // released routes, drawn once more while they fade
  const fadeSeq = useRef(0);

  const toastTimer = useRef(null);
  const showToast = useCallback((msg, err) => {
    setToast({ msg, err });
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3200);
  }, []);

  // A single place to mark the flow as edited so the file pill reflects it.
  const markDirty = useCallback(() => { setDirty(true); bump(); }, [bump]);

  /* ---- undo / redo ---------------------------------------------------------
     History entries are deep snapshots of the flow CONFIG (the source of truth)
     plus the editor-only positions — held in memory only (no localStorage).
     Every mutation calls pushHistory() BEFORE touching the config; undo/redo
     restore the config object and re-derive the whole view from it, so the
     canvas can never disagree with what would be saved. JSON round-tripping
     preserves key order, so undo never perturbs serialization. */
  const undoStack = useRef([]);
  const redoStack = useRef([]);
  const lastEditKey = useRef(null); // coalesce keystrokes in one field → one undo step
  const [, setHistRev] = useState(0); // re-render for button enabled/disabled
  const takeSnapshot = () => {
    const sig = JSON.stringify(flowRef.current) + JSON.stringify(posRef.current);
    return { flow: JSON.parse(JSON.stringify(flowRef.current)), pos: { ...posRef.current }, sig };
  };
  // coalesceKey (optional string): consecutive pushes with the SAME key are
  // collapsed — React onChange fires per keystroke, and typing one sentence
  // must be ONE undo step, not forty.
  const pushHistory = useCallback((coalesceKey) => {
    if (!flowRef.current) return;
    const key = typeof coalesceKey === "string" ? coalesceKey : null;
    if (key && lastEditKey.current === key) { redoStack.current = []; return; }
    lastEditKey.current = key;
    const snap = takeSnapshot();
    // skip no-op entries (e.g. a node click that starts a drag but never moves)
    const top = undoStack.current[undoStack.current.length - 1];
    if (top && top.sig === snap.sig) return;
    undoStack.current.push(snap);
    if (undoStack.current.length > 100) undoStack.current.shift();
    redoStack.current = [];
    setHistRev((h) => h + 1);
  }, []);
  const clearHistory = useCallback(() => {
    undoStack.current = [];
    redoStack.current = [];
    lastEditKey.current = null;
    setHistRev((h) => h + 1);
  }, []);
  const restoreSnapshot = useCallback((snap) => {
    flowRef.current = snap.flow;
    posRef.current = { ...snap.pos };
    lastEditKey.current = null;
    setSelected((s) => (s && snap.flow.nodes && snap.flow.nodes[s] ? s : null));
    setDirty(true);
    setHistRev((h) => h + 1);
    bump();
  }, [bump]);
  const undo = useCallback(() => {
    if (!flowRef.current || !undoStack.current.length) return;
    redoStack.current.push(takeSnapshot());
    restoreSnapshot(undoStack.current.pop());
    showToast("Undid the last change");
  }, [restoreSnapshot, showToast]);
  const redo = useCallback(() => {
    if (!flowRef.current || !redoStack.current.length) return;
    undoStack.current.push(takeSnapshot());
    restoreSnapshot(redoStack.current.pop());
    showToast("Redid the change");
  }, [restoreSnapshot, showToast]);

  /* ---- insert a step INTO a seam (A→B becomes A→new→B) ---------------------
     The one proven insert primitive, unchanged: create a custom-question step
     (blank from the palette, or a component's saved questions), point its
     `next` at the old target, and repoint the seam's own routing value —
     node.next, bucket.next, or a plain-string function behavior.goto. One
     history snapshot covers it all → one ⌘Z reverses a drag-insert. */
  const CANT_INSERT_MSG =
    "A step can't be added on this connection — try a line further along the call, or drop it on empty space to keep it nearby.";
  const performInsert = useCallback((edgeInfo, payload) => {
    const flow = flowRef.current;
    if (!flow || !edgeInfo || !edgeInfo.via) { showToast(CANT_INSERT_MSG, true); return; }
    const { source, target, via } = edgeInfo;
    if (via.type === "goto") {
      // Guard FIRST (before any mutation or history snapshot): only plain
      // string gotos are insertable (computeEdges enforces this); anything
      // else means stale edge data — bail without mutating.
      const def = flow.functions[via.fn];
      if (!def || !def.behavior || typeof def.behavior.goto !== "string") {
        showToast(CANT_INSERT_MSG, true);
        return;
      }
    }
    pushHistory();
    let id, nn;
    if (payload && payload.kind === "component") {
      id = uniqueId(flow, slugify(payload.name) || "component");
      nn = componentSkeleton(payload);
    } else {
      id = uniqueId(flow, "collect");
      nn = newNodeSkeleton("collect-custom");
    }
    nn.next = target || "";                 // new → original downstream
    flow.nodes[id] = nn;
    if (via.type === "next") flow.nodes[source].next = id;
    else if (via.type === "bucket") flow.nodes[source].buckets[via.index].next = id;
    else if (via.type === "goto") {
      // REPLACE the function's single linear goto in place — the goto lives on
      // `behavior`, and a function must never end up with more than one goto.
      const def = flow.functions[via.fn];
      def.behavior.goto = id;
      // Remove any stray function-level "goto" a previous buggy insert left
      // behind — the engine only reads behavior.goto; a second goto is invalid.
      delete def.goto;
    }
    // re-flow the layout so the new step slots cleanly between the two
    posRef.current = {};
    setSelected(id);
    setShowFlowSettings(false);
    setDirty(true);
    setViewKey((k) => k + 1);
    bump();
    showToast(`Added "${prettyStep(id)}" between "${prettyStep(source)}" and "${prettyStep(target)}" — edit it in the panel`);
  }, [bump, showToast, pushHistory]);

  // Shared entry for BOTH the "+" pill and a palette drop: mechanically-safe
  // seams insert silently; ambiguous positions get a one-line confirm first.
  const requestInsert = useCallback((edgeInfo, payload) => {
    const flow = flowRef.current;
    if (!flow || !edgeInfo || !edgeInfo.via) { showToast(CANT_INSERT_MSG, true); return; }
    const concern = insertConcern(flow, edgeInfo);
    if (concern) {
      setConfirmBox({
        title: "Add the step here?",
        message: concern,
        confirmLabel: "Add step",
        tone: "primary",
        onConfirm: () => { setConfirmBox(null); performInsert(edgeInfo, payload); },
      });
    } else {
      performInsert(edgeInfo, payload);
    }
  }, [performInsert, showToast]);

  /* ---- rename (shared by the panel field AND double-click-on-card) --------
     Validates, then delegates to renameNodeInFlow — the ONE place that
     rewrites every routing reference (next, fallback, bucket targets,
     function behavior.goto at the correct level, initial_node).
     Returns an error string, or null on success. */
  const renameNode = useCallback((oldId, newIdRaw) => {
    const flow = flowRef.current;
    if (!flow || !flow.nodes[oldId]) return "That step no longer exists.";
    const newId = String(newIdRaw || "").trim();
    if (newId === oldId) return null;
    if (!/^[A-Za-z0-9_-]+$/.test(newId)) {
      showToast("Step names can use letters, numbers, _ and - only", true);
      return "Use letters, numbers, _ and - only.";
    }
    if (flow.nodes[newId]) {
      showToast(`A step named "${newId}" already exists`, true);
      return `A step named "${newId}" already exists.`;
    }
    pushHistory();
    renameNodeInFlow(flow, oldId, newId, posRef.current);
    setSelected((s) => (s === oldId ? newId : s));
    setDirty(true);
    bump();
    showToast(`Renamed to "${newId}"`);
    return null;
  }, [pushHistory, bump, showToast]);

  /* ---- delete (shared by the panel button AND the Delete/Backspace key) ----
     Always deletes from the CONFIG via the in-app confirm modal — never a
     visual-only removal (React Flow's built-in delete key is disabled below,
     since it only removed the card from the canvas and the step re-appeared
     on the next rebuild). */
  const requestDelete = useCallback((nodeId) => {
    const flow = flowRef.current;
    if (!flow || !flow.nodes[nodeId]) return;
    const node = flow.nodes[nodeId];
    // Delete reverses insert when it safely can: EXACTLY one inbound route of a
    // rewireable kind (next / bucket next / plain behavior.goto — the same
    // three insert writes) AND the node has its own simple `next` to a real
    // node. Then A → deleted → B becomes A → B again. Anything more complex
    // falls back to plain removal, with an honest warning.
    const inbound = inboundRoutes(flow, nodeId);
    const nextId = typeof node.next === "string" && node.next && node.next !== nodeId
      && flow.nodes[node.next] ? node.next : null;
    const canBridge = inbound.length === 1 && !inbound[0].complex && !!nextId;
    const message = canBridge
      ? `This removes the step and reconnects the flow around it — the step before it will go straight to “${prettyStep(nextId)}”. You can undo this with ⌘Z.`
      : (inbound.length > 0
          ? `This removes the step from the flow and the saved file. ${inbound.length} connection${inbound.length > 1 ? "s" : ""} pointing here will be left unconnected — reconnect the affected steps afterwards. You can undo this with ⌘Z.`
          : "This removes the step from the flow — it will be gone from the saved file too. You can undo this with ⌘Z.");
    setConfirmBox({
      title: `Delete “${prettyStep(nodeId)}”?`,
      message,
      confirmLabel: "Delete step",
      onConfirm: () => {
        pushHistory(); // ONE snapshot covers the rewire + removal → one ⌘Z
        if (canBridge) inbound[0].rewire(nextId);
        delete flow.nodes[nodeId];
        delete posRef.current[nodeId];
        if (flow.initial_node === nodeId) flow.initial_node = Object.keys(flow.nodes)[0] || "";
        setConfirmBox(null);
        setSelected(null);
        setDirty(true);
        bump();
        showToast(canBridge
          ? `Deleted "${prettyStep(nodeId)}" — reconnected the flow to "${prettyStep(nextId)}"`
          : `Deleted "${prettyStep(nodeId)}"`);
      },
    });
  }, [pushHistory, bump, showToast]);

  /* ---- remove an individual arrow -------------------------------------------
     Clicking an arrow selects it; Delete/Backspace or its ✕ removes the route
     by setting that ONE plain slot to null (the engine's own "no target"
     value) via the same repointRoute machinery. Conditional/complex arrows
     aren't deletable — clicking them explains why instead. */
  const requestRouteDelete = useCallback((edgeId) => {
    const flow = flowRef.current;
    const e = edgesRef.current.find((x) => x.id === edgeId);
    if (!flow || !e) return;
    const slot = e.data.slotRef;
    if (!slot) { showToast(e.data.blockedMsg || MSG_COMPLEX_PORT, true); return; }
    // revalidate against the LIVE config — never delete through a stale slot
    if (slotTarget(flow, slot) !== e.target) { setSelectedEdge(null); return; }
    setConfirmBox({
      title: `Remove the connection from “${prettyStep(e.source)}” to “${prettyStep(e.target)}”?`,
      message: `The call will no longer continue from “${prettyStep(e.source)}” to “${prettyStep(e.target)}”. You can undo this with ⌘Z.`,
      confirmLabel: "Remove it",
      onConfirm: () => {
        pushHistory(); // ONE snapshot → one ⌘Z restores the arrow
        repointRoute(flow, slot, null);
        setConfirmBox(null);
        setSelectedEdge(null);
        setDirty(true);
        bump();
        showToast(`Removed — "${prettyStep(e.target)}" is no longer on this path.`);
      },
    });
  }, [pushHistory, bump, showToast]);

  /* rebuild the React Flow view from the current flow config */
  const rebuild = useCallback((relayout) => {
    const flow = flowRef.current;
    if (!flow) { setRfNodes([]); setRfEdges([]); return; }
    // attach the live insert/drop/delete handlers + rewire descriptor to each edge
    const edges = computeEdges(flow).map((e) => ({
      ...e,
      data: {
        ...e.data,
        onInsert: (info) => requestInsert(info, null),
        onDropInsert: (info) => {
          const payload = dragPayloadRef.current;
          dragPayloadRef.current = null;
          setDragInsert(false);
          requestInsert(info, payload);
        },
        onDeleteRoute: requestRouteDelete,
        edgeInfo: { source: e.data.source, target: e.data.target, via: e.data.via },
        emph: !!selected && (e.source === selected || e.target === selected),
        isSel: e.id === selectedEdge,
        dropActive: dragInsert,
      },
    }));
    edgesRef.current = edges;
    // an arrow that no longer exists (undo, delete, repoint) can't stay selected
    if (selectedEdge && !edges.some((e) => e.id === selectedEdge)) setSelectedEdge(null);
    // a step nothing routes to (and isn't the start) is a disconnected orphan
    const incoming = new Set(edges.map((e) => e.target));
    const outgoing = new Set(edges.map((e) => e.source));
    if (relayout || Object.keys(posRef.current).length === 0) {
      posRef.current = layout(flow);
    }
    const auto = layout(flow); // fills a slot for any node lacking a saved position
    const nodes = Object.entries(flow.nodes || {}).map(([id, node]) => {
      const slot = linearSlot(flow, id);
      // A slot-less linear card is honest about why its port won't drag:
      // it either has several / conditional ways out, or none at all yet.
      const hasWaysOut = (node.functions || []).some((fn) => {
        const def = (flow.functions || {})[fn];
        return def && behaviorTargets(def.behavior).length > 0;
      });
      return {
        id,
        type: "flowNode",
        position: posRef.current[id] || auto[id] || { x: 60, y: 60 },
        data: {
          node,
          isInitial: flow.initial_node === id,
          selected: selected === id,
          orphan: flow.initial_node !== id && !incoming.has(id),
          onRename: renameNode,
          ports: decisionPorts(flow, id),
          linearSlot: slot,
          linearBlockedMsg: hasWaysOut ? MSG_COMPLEX_PORT : MSG_NO_PATH,
          onPortBlocked: (msg) => showToast(msg, true),
          hasOut: outgoing.has(id),
        },
      };
    });
    setRfNodes(nodes);
    // released routes ride along briefly while they fade out
    const fades = fadeEdges.current.filter((f) => flow.nodes[f.source] && flow.nodes[f.target]);
    setRfEdges(fades.length ? [...edges, ...fades] : edges);
  }, [selected, selectedEdge, requestInsert, requestRouteDelete, renameNode, dragInsert, showToast]);

  useEffect(() => { rebuild(false); }, [rev, selected, rebuild]);

  /* ---- keyboard: ⌘Z / Ctrl+Z undo, ⌘⇧Z redo, Delete/Backspace deletes ------
     Skipped while typing in a field (native text undo wins) or while a modal
     is open. Delete goes through the same confirm-modal + config delete as
     the panel button — React Flow's visual-only delete key is disabled. */
  const uiRef = useRef({});
  useEffect(() => {
    uiRef.current = { selected, selectedEdge, modal: showOpen || !!savePrompt || showNewComponent || !!confirmBox };
  });
  useEffect(() => {
    const onKey = (e) => {
      const t = e.target;
      const typing = t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" ||
                           t.tagName === "SELECT" || t.isContentEditable);
      if (uiRef.current.modal) return;
      if ((e.metaKey || e.ctrlKey) && (e.key === "z" || e.key === "Z")) {
        if (typing) return;
        e.preventDefault();
        if (e.shiftKey) redo(); else undo();
      } else if ((e.key === "Backspace" || e.key === "Delete") && !typing && uiRef.current.selected) {
